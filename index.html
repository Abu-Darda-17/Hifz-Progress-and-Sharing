/* ══════════════════════════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════════════════════

      Real accounts (Level B) need Firebase. Without it, the app runs in a

const FIREBASE_CONFIG = {

  messagingSenderId: "831824157580",

};

if (FIREBASE_READY){ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.firestore(); auth=firebase.auth(); }
const MODE = FIREBASE_READY ? "firebase" : "local";

/* ── Quran reference data (letters = length weight; Abbawi/Noon, Rasm Uthmani) ── */
const NAMES=["Al-Fatihah","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
const AYAHS=[7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];
const LETTERS=[139,25900,14762,16085,12032,12571,14245,5349,10954,7521,7726,7203,3500,3497,2829,7723,6565,6488,3868,5338,4980,5237,4399,5664,3825,5573,4747,5861,4256,3434,2134,1542,5675,3549,3184,3020,3828,3018,4786,5041,3336,3471,3553,1455,2050,2627,2389,2479,1508,1488,1523,1305,1422,1461,1657,1719,2505,2011,1931,1542,945,755,787,1072,1184,1074,1330,1264,1113,951,953,1096,850,1024,668,1078,821,778,772,546,431,329,744,440,463,252,296,380,575,338,250,314,166,102,157,285,112,397,156,164,158,123,71,134,96,75,114,42,95,80,81,47,71,80];
const JUZ_STARTS=[[1,1],[2,142],[2,253],[3,93],[4,24],[4,148],[5,82],[6,111],[7,88],[8,41],[9,93],[11,6],[12,53],[15,1],[17,1],[18,75],[21,1],[23,1],[25,21],[27,56],[29,46],[33,31],[36,28],[39,32],[41,47],[46,1],[51,31],[58,1],[67,1],[78,1]];

const perAyah=(s)=>LETTERS[s-1]/AYAHS[s-1];
const TOTAL_LETTERS=LETTERS.reduce((a,b)=>a+b,0);
const JUZ_UNIT=TOTAL_LETTERS/30;
const CUM=(()=>{const c=[0];for(let i=0;i<114;i++)c.push(c[i]+AYAHS[i]);return c;})();
const gIdx=(s,a)=>CUM[s-1]+a;
function gToSA(g){for(let s=1;s<=114;s++)if(g<=CUM[s])return{s,a:g-CUM[s-1]};return{s:114,a:6};}
const JUZ=(()=>{const out=[];for(let j=0;j<30;j++){const startG=gIdx(JUZ_STARTS[j][0],JUZ_STARTS[j][1]);
  const endG=j<29?gIdx(JUZ_STARTS[j+1][0],JUZ_STARTS[j+1][1])-1:gIdx(114,6);const segs=[];let g=startG;
  while(g<=endG){const o=gToSA(g);const surahEndG=CUM[o.s];const segEndG=Math.min(endG,surahEndG);
    segs.push({surah:o.s,from:o.a,to:segEndG-CUM[o.s-1]});g=segEndG+1;}
  const letters=segs.reduce((t,x)=>t+(x.to-x.from+1)*perAyah(x.surah),0);out.push({num:j+1,segs,letters});}return out;})();

function mergeIntervals(list){if(!list.length)return[];const s=[...list].sort((a,b)=>a[0]-b[0]);const out=[s[0].slice()];
  for(let i=1;i<s.length;i++){const last=out[out.length-1];if(s[i][0]<=last[1]+1)last[1]=Math.max(last[1],s[i][1]);else out.push(s[i].slice());}return out;}
const countAyahs=(m)=>m.reduce((t,x)=>t+(x[1]-x[0]+1),0);
function overlapCount(m,from,to){let n=0;for(const x of m)n+=Math.max(0,Math.min(x[1],to)-Math.max(x[0],from)+1);return n;}
function intersectCount(A,B){let n=0;for(const x of A)n+=overlapCount(B,x[0],x[1]);return n;}
function intersectRanges(A,B){const out=[];for(const a of A)for(const b of B){const lo=Math.max(a[0],b[0]),hi=Math.min(a[1],b[1]);if(lo<=hi)out.push([lo,hi]);}return mergeIntervals(out);}

const todayStr=()=>new Date().toISOString().slice(0,10);
function dateNDaysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function currentStreak(dates){if(!dates.length)return 0;const set=new Set(dates);let anchor=todayStr();
  if(!set.has(anchor)){const y=new Date();y.setDate(y.getDate()-1);anchor=y.toISOString().slice(0,10);if(!set.has(anchor))return 0;}
  let n=0,cur=new Date(anchor);while(set.has(cur.toISOString().slice(0,10))){n++;cur.setDate(cur.getDate()-1);}return n;}
function prettyDate(d){const diff=Math.round((new Date(todayStr())-new Date(d))/86400000);
  if(diff===0)return"Today";if(diff===1)return"Yesterday";return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}
const uid=()=>(crypto&&crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random().toString(36).slice(2));

const LKEY={members:"halaqa_members",logs:"halaqa_logs",verifs:"halaqa_verifs",me:"halaqa_me"};
const lsGet=(k)=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};

function computeMember(member,logs,verifs){
  const mine=logs.filter(l=>l.memberId===member.id);
  const newBy={},revBy={},dates=[];let lastRevised=null;
  mine.forEach(l=>{dates.push(l.date);const b=l.type==="rev"?revBy:newBy;(b[l.surah]=b[l.surah]||[]).push([l.from,l.to]);
    if(l.type==="rev"&&(!lastRevised||l.date>lastRevised))lastRevised=l.date;});
  const mergedNew={};for(const s in newBy)mergedNew[s]=mergeIntervals(newBy[s]);
  let memorizedLetters=0;const surahPct={};
  for(let s=1;s<=114;s++){const merged=mergedNew[s]||[];const ay=countAyahs(merged);memorizedLetters+=ay*perAyah(s);
    surahPct[s]={ayahs:ay,pct:ay/AYAHS[s-1],verified:0,ranges:merged,verRanges:[]};}
  const juzFrac=JUZ.map(jz=>{let mem=0;jz.segs.forEach(seg=>{const merged=mergedNew[seg.surah]||[];
    mem+=overlapCount(merged,seg.from,seg.to)*perAyah(seg.surah);});return jz.letters?mem/jz.letters:0;});
  let revisedLetters=0;for(const s in revBy)revBy[s].forEach(x=>{revisedLetters+=(x[1]-x[0]+1)*perAyah(s);});
  const c7=dateNDaysAgo(7),c30=dateNDaysAgo(30);let new7=0,new30=0;
  mine.forEach(l=>{if(l.type!=="rev"){const w=(l.to-l.from+1)*perAyah(l.surah);if(l.date>=c7)new7+=w;if(l.date>=c30)new30+=w;}});
  // verification (self-reported; counted only where it overlaps memorized)
  const myVer=verifs.filter(v=>v.memberId===member.id);
  const verBy={};myVer.forEach(v=>{(verBy[v.surah]=verBy[v.surah]||[]).push([v.from,v.to]);});
  let verifiedLetters=0;
  for(const s in verBy){const mergedV=mergeIntervals(verBy[s]);const cnt=intersectCount(mergedV,mergedNew[s]||[]);
    verifiedLetters+=cnt*perAyah(s);if(surahPct[s]){surahPct[s].verified=cnt;surahPct[s].verRanges=intersectRanges(mergedV,mergedNew[s]||[]);}}
  return{...member,memorizedLetters,pct:Math.min(100,(memorizedLetters/TOTAL_LETTERS)*100),surahPct,juzFrac,
    juzDone:juzFrac.filter(f=>f>=0.999).length,juzEquiv:juzFrac.reduce((a,b)=>a+b,0),
    revisedLetters,revSessions:mine.filter(l=>l.type==="rev").length,streak:currentStreak(dates),
    activeDays:new Set(dates).size,new7,new30,verifiedLetters,verifiedPct:(verifiedLetters/TOTAL_LETTERS)*100,
    verifs:myVer,lastActive:dates.length?dates.reduce((a,b)=>a>b?a:b):null,lastRevised};
}

function timeAgo(ms){
  const d=Date.now()-ms;
  if(d<60000)return "just now";
  const m=Math.floor(d/60000); if(m<60)return m+"m ago";
  const h=Math.floor(m/60); if(h<24)return h+"h ago";
  const dy=Math.floor(h/24); if(dy<7)return dy+"d ago";
  const w=Math.floor(dy/7); if(dy<14)return w+"w ago";
  return new Date(ms).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function segStyles(ranges,total){
  if(!ranges||!ranges.length||!total)return [];
  const MINW=1.2; // % — keeps a single ayah in a long surah visible
  return ranges.map(r=>{
    const left=((r[0]-1)/total)*100;
    let w=((r[1]-r[0]+1)/total)*100;
    if(w<MINW)w=MINW;
    const l=Math.min(left,100-w);
    return {left:Math.max(0,l)+"%",width:w+"%"};
  });
}
function rangesLabel(ranges){
  if(!ranges||!ranges.length)return "—";
  return ranges.map(r=>r[0]===r[1]?String(r[0]):r[0]+"–"+r[1]).join(", ");
}

function Star(props){const size=props.size||24,fill=props.fill||"#B5872E",stroke=props.stroke||"none";
  return(<svg width={size} height={size} viewBox="0 0 100 100" aria-hidden="true">
    <rect x="22" y="22" width="56" height="56" rx="4" fill={fill} stroke={stroke}/>
    <rect x="22" y="22" width="56" height="56" rx="4" fill={fill} stroke={stroke} transform="rotate(45 50 50)"/>
  </svg>);}
function JuzRibbon(props){const h=props.height||10;
  return(<div className="ribbon" title="30 juz">{props.fractions.map((f,i)=>(
    <div key={i} className="cell" style={{height:h}}>
      <i style={{height:Math.round(f*100)+"%",background:f>=0.999?"var(--em)":"var(--em2)"}}/>
    </div>))}</div>);}
function ChampBadges(props){const boards=props.boards||[];if(!boards.length)return null;
  return(<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginTop:6}}>
    {props.label && <span className="muted" style={{fontSize:11}}>{props.label}</span>}
    {boards.map(k=><span key={k} style={{fontSize:10,color:"var(--brass)",border:"1px solid var(--brass2)",
      borderRadius:999,padding:"2px 8px",whiteSpace:"nowrap"}}>🏆 {BOARDS[k].label}</span>)}
  </div>);}

const BOARDS={
  completion:{label:"Completion",blurb:"Most of the Quran memorized, weighted by length.",
    cmp:(a,b)=>b.memorizedLetters-a.memorizedLetters||b.juzEquiv-a.juzEquiv,
    value:(s)=>s.pct.toFixed(1)+"%",unit:"memorized",active:(s)=>s.memorizedLetters>0,
    sub:(s)=>s.juzEquiv.toFixed(1)+" / 30 juz · "+s.juzDone+" complete"},
  verified:{label:"Verified",blurb:"Confirmed with a local teacher — the most trustworthy measure.",
    cmp:(a,b)=>b.verifiedLetters-a.verifiedLetters,
    value:(s)=>s.verifiedPct.toFixed(1)+"%",unit:"verified ✓",active:(s)=>s.verifiedLetters>0,
    sub:(s)=>"of "+s.pct.toFixed(1)+"% memorized"},
  consistency:{label:"Consistency",blurb:"Longest active daily streak — showing up matters most.",
    cmp:(a,b)=>b.streak-a.streak||b.activeDays-a.activeDays||b.memorizedLetters-a.memorizedLetters,
    value:(s)=>String(s.streak),unit:s=>"day"+(s.streak===1?"":"s")+" 🔥",active:(s)=>s.streak>0,
    sub:(s)=>s.activeDays+" active day"+(s.activeDays===1?"":"s")+(s.lastActive?" · last "+prettyDate(s.lastActive):"")},
  momentum:{label:"This month",blurb:"New memorization in the last 30 days — anyone can lead here.",
    cmp:(a,b)=>b.new30-a.new30||b.new7-a.new7,
    value:(s)=>(s.new30/JUZ_UNIT).toFixed(1),unit:"juz this month",active:(s)=>s.new30>0,
    sub:(s)=>(s.new7/JUZ_UNIT).toFixed(1)+" juz this week"},
};

/* ══════════════════════════ ROOT: gate → auth → app ══════════════════════════ */
/* ── Username support ─────────────────────────────────────────────────────────
   Firebase Auth only knows emails. For username accounts we mint an internal
   address (username@USERNAME_DOMAIN) and keep a public usernames/{lower} doc
   mapping the username to that address so people can sign in by username.
   Username-only accounts have NO password recovery — the user is warned.        */
const USERNAME_DOMAIN="halaqa.local";
const isEmail=(s)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s.trim());
const userRe=/^[a-zA-Z0-9._-]{3,20}$/;
function usernameError(u){
  u=(u||"").trim();
  if(!u)return "Please choose a username.";
  if(!userRe.test(u))return "3–20 characters: letters, numbers, dot, underscore or hyphen.";
  return "";
}
async function usernameTaken(u){
  const d=await db.collection("usernames").doc(u.trim().toLowerCase()).get();
  return d.exists;
}
async function emailForUsername(u){
  const d=await db.collection("usernames").doc(u.trim().toLowerCase()).get();
  return d.exists?(d.data().email||null):null;
}

/* Google sign-in. Works for new users, returning users, and (via linking) guests. */
async function signInWithGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:"select_account"});
  const cur=auth.currentUser;
  let cred;
  if(cur && cur.isAnonymous){
    // Guest upgrading: keep the same uid so all logged progress is preserved.
    try{
      cred=await cur.linkWithPopup(provider);
    }catch(e){
      if(e.code==="auth/credential-already-in-use")
        throw new Error("That Google account already has a Halaqa account. Sign out of guest mode and sign in with Google instead. (Progress logged as a guest can't be merged into an existing account.)");
      throw e;
    }
  }else{
    cred=await auth.signInWithPopup(provider);
  }
  const u=cred.user;
  // create the member profile the first time
  const ref=db.collection("members").doc(u.uid);
  const snap=await ref.get();
  if(!snap.exists || !(snap.data()||{}).name){
    await ref.set({id:u.uid,name:(u.displayName||"Member").trim(),email:u.email||null,guest:false,createdAt:Date.now()},{merge:true});
  }else{
    await ref.set({email:u.email||null,guest:false},{merge:true});
  }
  return u;
}

function Root(){
  const [gated,setGated]=useState(!APP_PASSPHRASE || 
localStorage.getItem("halaqa_gate")==="ok");
  const [user,setUser]=useState(MODE==="firebase"?undefined:null);
  const [localMe,setLocalMe]=useState(()=>{const m=lsGet(LKEY.me);return m&&m.id?m:null;});

  useEffect(()=>{ if(MODE==="firebase") return auth.onAuthStateChanged(u=>setUser(u||null)); },[]);

  if(!gated) return <Gate onPass={()=>{localStorage.setItem("halaqa_gate","ok");setGated(true);}}/>;

  if(MODE==="firebase"){
    if(user===undefined) return <Loading/>;
    if(!user) return <AuthScreen/>;
    return <App currentUid={user.uid} currentEmail={user.email} isGuest={!!user.isAnonymous}/>;
  }
  // local test mode
  if(!localMe) return <LocalNameScreen onSet={(name)=>{const me={id:uid(),name:name.trim()};lsSet(LKEY.me,me);
    const ms=lsGet(LKEY.members).filter(x=>x.id!==me.id);ms.push({id:me.id,name:me.name,createdAt:Date.now()});lsSet(LKEY.members,ms);setLocalMe(me);}}/>;
  return <App currentUid={localMe.id} currentEmail={null}/>;
}

        border:"1px solid var(--line)",boxShadow:"0 8px 30px rgba(19,50,42,.16)"}}>
        <img src={HERO_IMG} alt="" style={{display:"block",width:"100%",height:"auto"}}/>
        <div style={{position:"absolute",inset:0,
          background:"linear-gradient(180deg, rgba(19,50,42,0) 45%, rgba(19,50,42,.55) 100%)"}}/>
        <div style={{position:"absolute",left:0,right:0,bottom:10,display:"flex",justifyContent:"center"}}>
          <span className="orn-pulse" style={{display:"inline-flex",transformOrigin:"center"}}>
            <Star size={26} fill="var(--brass2)"/>
          </span>
        </div>

      <div className="serif" style={{color:"var(--ink)",fontSize:16.5,lineHeight:1.65,marginTop:20,fontStyle:"italic"}}>
        “So compete with one another in doing good. Wherever you are, Allah will bring you all together ˹for judgment˺.”
      </div>
      <div style={{marginTop:12,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <span style={{height:1,width:26,background:"var(--brass2)"}}/>

    </div>
  </div>);
}

function Gate(props){
  const [v,setV]=useState("");const [err,setErr]=useState(false);
  function go(){if(v===APP_PASSPHRASE){props.onPass();}else{setErr(true);}}
  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Star size={30} fill="var(--em)"/>
      <h1 className="brand" style={{fontSize:24}}>Halaqa</h1></div>
    <label className="lb">Circle passphrase</label>
    <input className="f" type="password" value={v} autoFocus
      onChange={e=>{setV(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()}/>
    {err && <div style={{color:"var(--danger)",fontSize:12,marginTop:8}}>That passphrase isn't right.</div>}
    <button className="btn primary" style={{marginTop:14,width:"100%"}} onClick={go}>Enter</button>
    <div className="muted" style={{fontSize:11,marginTop:12,lineHeight:1.5}}>Shared with your circle privately. This keeps out strangers; your account still protects your own data.</div>
  </div></div>);
}

function LocalNameScreen(props){
  const [name,setName]=useState("");
  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><Star size={30} fill="var(--em)"/>
      <h1 className="brand" style={{fontSize:24}}>Halaqa</h1></div>
    <div className="banner warn" style={{marginTop:8}}>Local test mode — no cloud, no accounts. Add Firebase for real accounts and sharing.</div>
    <label className="lb" style={{marginTop:14}}>Your name</label>
    <input className="f" value={name} autoFocus onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&props.onSet(name)}/>
    <button className="btn primary" style={{marginTop:14,width:"100%"}} disabled={!name.trim()} onClick={()=>props.onSet(name)}>Start</button>
  </div></div>);
}

function AuthScreen(){
  const [mode,setMode]=useState("in");
  const [id,setId]=useState("");          // sign-in: username OR email
  const [useEmail,setUseEmail]=useState(true); // sign-up method
  const [email,setEmail]=useState("");
  const [uname,setUname]=useState("");
  const [pw,setPw]=useState("");
  const [name,setName]=useState("");
  const [ack,setAck]=useState(false);     // acknowledged no-recovery warning
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const [info,setInfo]=useState("");

  async function submit(){
    setErr("");setInfo("");setBusy(true);
    try{
      if(mode==="up"){
        if(!name.trim())throw new Error("Please enter your name.");
        if(!pw || pw.length<6)throw new Error("Password must be at least 6 characters.");
        if(useEmail){
          if(!isEmail(email))throw new Error("Please enter a valid email address.");
          const cred=await auth.createUserWithEmailAndPassword(email.trim(),pw);
          await db.collection("members").doc(cred.user.uid).set({id:cred.user.uid,name:name.trim(),email:email.trim(),createdAt:Date.now()});
        }else{
          const ue=usernameError(uname); if(ue)throw new Error(ue);
          if(!ack)throw new Error("Please tick the box to confirm you understand the password cannot be recovered.");
          const key=uname.trim().toLowerCase();
          if(await usernameTaken(key))throw new Error("That username is already taken.");
          const internal=key+"@"+USERNAME_DOMAIN;
          const cred=await auth.createUserWithEmailAndPassword(internal,pw);
          await db.collection("usernames").doc(key).set({username:key,email:internal,uid:cred.user.uid,createdAt:Date.now()});
          await db.collection("members").doc(cred.user.uid).set({id:cred.user.uid,name:name.trim(),username:key,email:null,createdAt:Date.now()});
        }
      }else{
        const raw=id.trim(); if(!raw)throw new Error("Enter your username or email.");
        let addr=raw;
        if(!isEmail(raw)){
          addr=await emailForUsername(raw);
          if(!addr)throw new Error("No account found with that username.");
        }
        await auth.signInWithEmailAndPassword(addr,pw);
      }
    }catch(e){setErr(friendlyAuthError(e));}
    setBusy(false);
  }

  async function guest(){
    setErr("");setBusy(true);
    try{ await auth.signInAnonymously(); }
    catch(e){ setErr(friendlyAuthError(e)); }
    setBusy(false);
  }

  async function google(){
    setErr("");setInfo("");setBusy(true);
    try{ await signInWithGoogle(); }
    catch(e){ setErr(friendlyAuthError(e)); }
    setBusy(false);
  }

  async function resetPw(){
    setErr("");setInfo("");
    const raw=id.trim();
    if(!raw)return setErr("Enter your email above first.");
    let addr=raw;
    try{
      if(!isEmail(raw)){ addr=await emailForUsername(raw); }
      if(!addr)return setErr("No account found.");
      if(addr.endsWith("@"+USERNAME_DOMAIN))
        return setErr("This is a username-only account, so there is no email to send a reset to. Its password cannot be recovered.");
      await auth.sendPasswordResetEmail(addr);
      setInfo("Password reset email sent. Check your inbox.");
    }catch(e){setErr(friendlyAuthError(e));}
  }

  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Star size={30} fill="var(--em)"/>
      <h1 className="brand" style={{fontSize:24}}>Halaqa</h1></div>
    <div className="row" style={{marginBottom:16,gap:6}}>
      <button className={"pill"+(mode==="in"?" active":"")} onClick={()=>{setMode("in");setErr("");setInfo("");}}>Sign in</button>
      <button className={"pill"+(mode==="up"?" active":"")} onClick={()=>{setMode("up");setErr("");setInfo("");}}>Create account</button>
    </div>

    <GoogleButton busy={busy} onClick={google} label={mode==="up"?"Sign up with Google":"Continue with Google"}/>
    <div className="muted" style={{fontSize:11,marginTop:8,textAlign:"center"}}>Fastest and safest — no password to remember.</div>
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
      <span style={{height:1,flex:1,background:"var(--line)"}}/><span className="muted" style={{fontSize:11}}>or</span><span style={{height:1,flex:1,background:"var(--line)"}}/>
    </div>

    {mode==="in" ? (<React.Fragment>
      <label className="lb">Username or email</label>
      <input className="f" style={{marginBottom:12}} value={id} autoCapitalize="none" onChange={e=>setId(e.target.value)}/>
      <label className="lb">Password</label>
      <input className="f" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
      <div style={{textAlign:"right",marginTop:6}}><button className="link" style={{fontSize:11}} onClick={resetPw}>Forgot password?</button></div>
    </React.Fragment>) : (<React.Fragment>
      <label className="lb">Your name (shown on the board)</label>
      <input className="f" style={{marginBottom:12}} value={name} onChange={e=>setName(e.target.value)}/>

      <label className="lb">Sign up with</label>
      <div className="row" style={{marginBottom:12,gap:6}}>
        <button className={"pill"+(useEmail?" active":"")} style={{fontSize:13}} onClick={()=>{setUseEmail(true);setErr("");}}>Email</button>
        <button className={"pill"+(!useEmail?" active":"")} style={{fontSize:13}} onClick={()=>{setUseEmail(false);setErr("");}}>Username only</button>
      </div>

      {useEmail ? (<React.Fragment>
        <label className="lb">Email</label>
        <input className="f" style={{marginBottom:12}} type="email" value={email} autoCapitalize="none" onChange={e=>setEmail(e.target.value)}/>
        <div className="muted" style={{fontSize:11,marginBottom:12}}>Used only so you can recover your password. Never shown on the board.</div>
      </React.Fragment>) : (<React.Fragment>
        <label className="lb">Username</label>
        <input className="f" style={{marginBottom:8}} value={uname} autoCapitalize="none" placeholder="e.g. abu_darda" onChange={e=>setUname(e.target.value)}/>
        <div style={{background:"#FBF3DF",border:"1px solid #E6D39B",color:"#7A5B12",borderRadius:8,padding:"10px 12px",fontSize:12,lineHeight:1.5,marginBottom:10}}>
          <b>Please read.</b> With no email, there is <b>no way to recover your password</b> if you forget it — your account and all your progress would be lost permanently. We strongly recommend signing up with an email instead.
          <label style={{display:"flex",alignItems:"flex-start",gap:8,marginTop:8}}>
            <input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)} style={{marginTop:3}}/>
            <span>I understand my password cannot be recovered.</span>
          </label>
        </div>
      </React.Fragment>)}

      <label className="lb">Password</label>
      <input className="f" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
    </React.Fragment>)}

    {err && <div style={{color:"var(--danger)",fontSize:12,marginTop:10}}>{err}</div>}
    {info && <div style={{color:"var(--em)",fontSize:12,marginTop:10}}>{info}</div>}

    <button className="btn primary" style={{marginTop:16,width:"100%"}} disabled={busy} onClick={submit}>
      {busy?"…":(mode==="up"?"Create account":"Sign in")}</button>

    <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 12px"}}>
      <span style={{height:1,flex:1,background:"var(--line)"}}/><span className="muted" style={{fontSize:11}}>or</span><span style={{height:1,flex:1,background:"var(--line)"}}/>
    </div>
    <button className="btn" style={{width:"100%"}} disabled={busy} onClick={guest}>Continue as guest</button>
    <div className="muted" style={{fontSize:11,marginTop:10,lineHeight:1.5}}>
      As a guest you can track your own Hifz privately on this device. To join a community you'll need an account — you can create one later and keep your progress.
    </div>
  </div></div>);
}

function friendlyAuthError(e){
  const c=(e&&e.code)||"";
  if(c==="auth/email-already-in-use")return "An account already exists with that email.";
  if(c==="auth/account-exists-with-different-credential")return "You already have an account with that email, created a different way. Sign in with that method instead.";
  if(c==="auth/popup-closed-by-user"||c==="auth/cancelled-popup-request")return "Google sign-in was closed before finishing.";
  if(c==="auth/popup-blocked")return "Your browser blocked the Google pop-up. Allow pop-ups for this site and try again.";
  if(c==="auth/unauthorized-domain")return "This website address isn't authorised for Google sign-in yet. Add it in Firebase → Authentication → Settings → Authorized domains.";
  if(c==="auth/credential-already-in-use")return "That Google account is already linked to another Halaqa account.";
  if(c==="auth/invalid-email")return "That email address doesn't look right.";
  if(c==="auth/weak-password")return "Password must be at least 6 characters.";
  if(c==="auth/wrong-password"||c==="auth/invalid-credential")return "Wrong password, or that account doesn't exist.";
  if(c==="auth/user-not-found")return "No account found.";
  if(c==="auth/too-many-requests")return "Too many attempts. Please wait a little and try again.";
  if(c==="auth/operation-not-allowed")return "This sign-in method isn't enabled yet in Firebase (see the setup guide).";
  if(c==="auth/admin-restricted-operation")return "Guest sign-in isn't enabled yet in Firebase (enable Anonymous sign-in).";
  return (e&&e.message)||String(e);
}

function App(props){
  const currentUid=props.currentUid;
  const [members,setMembers]=useState([]);
  const [logs,setLogs]=useState([]);
  const [verifs,setVerifs]=useState([]);
  const [membersLoaded,setMembersLoaded]=useState(false);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("standings");
  const [focusMember,setFocusMember]=useState(null);
  const [myComms,setMyComms]=useState([]);
  const [pubComms,setPubComms]=useState([]);
  const [events,setEvents]=useState([]);
  const [selectedCid,setSelectedCid]=useState(()=>localStorage.getItem("halaqa_cid")||null);
  const [invite,setInvite]=useState(null);
  const [inviteBad,setInviteBad]=useState(false);
  const [bellOpen,setBellOpen]=useState(false);
  const [bellSeenAt,setBellSeenAt]=useState(null);
  const fileRef=useRef(null);
  function chooseCid(cid){setSelectedCid(cid);if(cid)localStorage.setItem("halaqa_cid",cid);else localStorage.removeItem("halaqa_cid");}

  useEffect(()=>{
    if(MODE==="firebase"){
      const u1=db.collection("members").onSnapshot(s=>{setMembers(s.docs.map(d=>d.data()));setMembersLoaded(true);});
      const u2=db.collection("logs").onSnapshot(s=>{setLogs(s.docs.map(d=>d.data()));setLoading(false);});
      const u3=db.collection("verifications").onSnapshot(s=>setVerifs(s.docs.map(d=>d.data())));
      const u4=db.collection("communities").where("members","array-contains",currentUid).onSnapshot(s=>setMyComms(s.docs.map(d=>d.data())));
      const u5=db.collection("communities").where("visibility","==","public").onSnapshot(s=>setPubComms(s.docs.map(d=>d.data())),()=>{});
      const u6=db.collection("events").orderBy("createdAt","desc").limit(80).onSnapshot(s=>setEvents(s.docs.map(d=>d.data())),()=>{});
      return()=>{u1();u2();u3();u4();u5();u6();};
    }else{setMembers(lsGet(LKEY.members));setLogs(lsGet(LKEY.logs));setVerifs(lsGet(LKEY.verifs));setMembersLoaded(true);setLoading(false);}
  },[]);

  useEffect(()=>{
    if(MODE!=="firebase")return;
    const p=new URLSearchParams(window.location.search);const cid=p.get("join"),code=p.get("code");
    if(cid&&code){
      db.collection("communities").doc(cid).get().then(d=>{
        if(d.exists){const c=d.data();
          if(c.inviteCode===code && c.inviteExpiresAt && Date.now()<c.inviteExpiresAt) setInvite(c);
          else setInviteBad(true);
        } else setInviteBad(true);
        window.history.replaceState({},"",window.location.pathname);
      }).catch(()=>{});
    }
  },[]);

  const stats=useMemo(()=>{
    const arr=members.map(m=>computeMember(m,logs,verifs));
    arr.sort((a,b)=>b.memorizedLetters-a.memorizedLetters||b.verifiedLetters-a.verifiedLetters||b.streak-a.streak);
    return arr;
  },[members,logs,verifs]);
  const me=stats.find(s=>s.id===currentUid);
  const myMember=members.find(m=>m.id===currentUid)||{};
  const myName=(me&&me.name)||myMember.name||"You";
  const prefs=Object.assign({newMem:true,juz:true,join:true,milestone:true},myMember.notifPrefs||{});
  const seenAt=myMember.notifSeenAt||0;

  const selectedCommunity = myComms.find(c=>c.id===selectedCid) || myComms[0] || null;
  const commMemberIds = MODE==="firebase" ? (selectedCommunity?selectedCommunity.members:[]) : members.map(m=>m.id);
  const cStats = stats.filter(s=>commMemberIds.indexOf(s.id)>=0);
  const cChampions={};for(const k in BOARDS){const B=BOARDS[k];const a=cStats.filter(B.active).sort(B.cmp);if(a.length)cChampions[k]=a[0].id;}
  const groupPct=cStats.length?(cStats.reduce((t,s)=>t+s.memorizedLetters,0)/(TOTAL_LETTERS*cStats.length))*100:0;
  const isAdmin=(c)=>c&&(c.admins||[]).indexOf(currentUid)>=0;

  const myCommIds=myComms.map(c=>c.id);
  const prefKey={new:"newMem",juz:"juz",surah:"milestone",full:"milestone",join:"join"};
  const NOTIF_MAX_AGE=14*24*60*60*1000, NOTIF_MAX=15;
  const cutoff=Date.now()-NOTIF_MAX_AGE;
  const myEvents=events.filter(e=>e.actorId!==currentUid
      && (e.communityIds||[]).some(id=>myCommIds.indexOf(id)>=0)
      && prefs[prefKey[e.type]]!==false
      && e.createdAt>=cutoff)
    .sort((a,b)=>b.createdAt-a.createdAt)
    .slice(0,NOTIF_MAX);
  const unread=myEvents.filter(e=>e.createdAt>seenAt).length;

  async function emitEvent(type,text,cids){
    if(MODE!=="firebase")return;
    const ids=cids||myComms.map(c=>c.id);if(!ids.length)return;
    const ev={id:uid(),actorId:currentUid,actorName:myName,type,text,communityIds:ids,createdAt:Date.now()};
    try{await db.collection("events").doc(ev.id).set(ev);}catch(e){}
  }
  async function addLog(entry){const lg={id:uid(),memberId:currentUid,...entry};
    if(MODE==="firebase")await db.collection("logs").doc(lg.id).set(lg);
    else{const n=[...logs,lg];setLogs(n);lsSet(LKEY.logs,n);}
    if(entry.type==="new"){
      const mineOld=logs.filter(l=>l.memberId===currentUid);
      const before=computeMember({id:currentUid},mineOld,[]);
      const after=computeMember({id:currentUid},[...mineOld,lg],[]);
      emitEvent("new","memorized "+NAMES[lg.surah-1]+" "+lg.from+(lg.to!==lg.from?"–"+lg.to:""));
      for(let s=1;s<=114;s++){if(after.surahPct[s].pct>=0.999&&before.surahPct[s].pct<0.999&&AYAHS[s-1]>12)emitEvent("surah","completed Surah "+NAMES[s-1]);}
      after.juzFrac.forEach((f,j)=>{if(f>=0.999&&before.juzFrac[j]<0.999)emitEvent("juz","completed Juz "+(j+1));});
      if(after.pct>=99.999&&before.pct<99.999)emitEvent("full","completed the whole Quran — full Hifz, mā shāʾ Allāh");
    }
  }
  async function removeLog(id){
    if(MODE==="firebase")await db.collection("logs").doc(id).delete();
    else{const n=logs.filter(l=>l.id!==id);setLogs(n);lsSet(LKEY.logs,n);}}
  async function addVerif(entry){const v={id:uid(),memberId:currentUid,...entry};
    if(MODE==="firebase")await db.collection("verifications").doc(v.id).set(v);
    else{const n=[...verifs,v];setVerifs(n);lsSet(LKEY.verifs,n);}}
  async function removeVerif(id){
    if(MODE==="firebase")await db.collection("verifications").doc(id).delete();
    else{const n=verifs.filter(v=>v.id!==id);setVerifs(n);lsSet(LKEY.verifs,n);}}
  async function saveName(name){
    if(MODE==="firebase"){
      const doc={id:currentUid,name:name.trim(),createdAt:Date.now()};
      if(props.currentEmail && !String(props.currentEmail).endsWith("@"+USERNAME_DOMAIN))doc.email=props.currentEmail;
      if(props.isGuest)doc.guest=true;
      await db.collection("members").doc(currentUid).set(doc,{merge:true});
    }
    else{const ms=lsGet(LKEY.members).map(m=>m.id===currentUid?{...m,name:name.trim()}:m);setMembers(ms);lsSet(LKEY.members,ms);
      lsSet(LKEY.me,{id:currentUid,name:name.trim()});}}
  function signOut(){ if(MODE==="firebase")auth.signOut(); else {localStorage.removeItem(LKEY.me);location.reload();} }

  // Guest -> real account. Links the credential so the SAME uid (and all logs) is kept.
  async function upgradeGuest(kind,identifier,pw,displayName){
    if(kind==="email"){
      if(!isEmail(identifier))throw new Error("Please enter a valid email address.");
      const cred=firebase.auth.EmailAuthProvider.credential(identifier.trim(),pw);
      await auth.currentUser.linkWithCredential(cred);
      await db.collection("members").doc(currentUid).set({id:currentUid,name:(displayName||myName).trim(),email:identifier.trim(),guest:false},{merge:true});
    }else{
      const ue=usernameError(identifier); if(ue)throw new Error(ue);
      const key=identifier.trim().toLowerCase();
      if(await usernameTaken(key))throw new Error("That username is already taken.");
      const internal=key+"@"+USERNAME_DOMAIN;
      const cred=firebase.auth.EmailAuthProvider.credential(internal,pw);
      await auth.currentUser.linkWithCredential(cred);
      await db.collection("usernames").doc(key).set({username:key,email:internal,uid:currentUid,createdAt:Date.now()});
      await db.collection("members").doc(currentUid).set({id:currentUid,name:(displayName||myName).trim(),username:key,email:null,guest:false},{merge:true});
    }
  }

  const FV=(MODE==="firebase")?firebase.firestore.FieldValue:null;
  const WEEK=7*24*60*60*1000;
  const newCode=()=>Math.random().toString(36).slice(2,8).toUpperCase();
  async function saveNotifPrefs(np){ if(MODE==="firebase")await db.collection("members").doc(currentUid).set({notifPrefs:np},{merge:true}); }
  async function markNotifSeen(){ if(MODE==="firebase")await db.collection("members").doc(currentUid).set({notifSeenAt:Date.now()},{merge:true}); }
  async function createCommunity(name,description,visibility,seedAll){
    const cid=uid(),code=newCode();const mem=[currentUid];
    if(seedAll)members.forEach(m=>{if(mem.indexOf(m.id)<0)mem.push(m.id);});
    await db.collection("communities").doc(cid).set({id:cid,name:name.trim(),description:(description||"").trim(),
      visibility,inviteCode:code,inviteExpiresAt:Date.now()+WEEK,lastJoinCode:code,members:mem,admins:[currentUid],createdBy:currentUid,createdAt:Date.now()});
    chooseCid(cid);
  }
  async function setVisibility(c,vis){ await db.collection("communities").doc(c.id).update({visibility:vis}); }
  async function regenInvite(c){ await db.collection("communities").doc(c.id).update({inviteCode:newCode(),inviteExpiresAt:Date.now()+WEEK}); }
  async function revokeInvite(c){ await db.collection("communities").doc(c.id).update({inviteExpiresAt:0}); }
  async function requestJoin(c){ await db.collection("communities").doc(c.id).collection("requests").doc(currentUid).set({memberId:currentUid,name:myName,createdAt:Date.now()}); }
  async function cancelRequest(c){ await db.collection("communities").doc(c.id).collection("requests").doc(currentUid).delete(); }
  async function approveReq(cid,ruid){ await db.collection("communities").doc(cid).update({members:FV.arrayUnion(ruid)});
    await db.collection("communities").doc(cid).collection("requests").doc(ruid).delete();
    const nm=(members.find(m=>m.id===ruid)||{}).name||"A member";
    const ev={id:uid(),actorId:ruid,actorName:nm,type:"join",text:"joined the community",communityIds:[cid],createdAt:Date.now()};
    try{await db.collection("events").doc(ev.id).set(ev);}catch(e){} }
  async function rejectReq(cid,ruid){ await db.collection("communities").doc(cid).collection("requests").doc(ruid).delete(); }
  async function removeMemberFromComm(c,ruid){ const admins=(c.admins||[]).filter(x=>x!==ruid);
    await db.collection("communities").doc(c.id).update({members:FV.arrayRemove(ruid),admins}); }
  async function promoteAdmin(c,ruid){ await db.collection("communities").doc(c.id).update({admins:FV.arrayUnion(ruid)}); }
  async function leaveCommunity(c){
    const remaining=(c.members||[]).filter(x=>x!==currentUid);
    if(remaining.length===0){ await db.collection("communities").doc(c.id).delete(); if(selectedCid===c.id)chooseCid(null); return; }
    let admins=(c.admins||[]).filter(x=>x!==currentUid); if(admins.length===0)admins=[remaining[0]];
    await db.collection("communities").doc(c.id).update({members:FV.arrayRemove(currentUid),admins});
    if(selectedCid===c.id)chooseCid(null);
  }
  async function joinByInvite(c){
    await db.collection("communities").doc(c.id).update({members:FV.arrayUnion(currentUid),lastJoinCode:c.inviteCode});
    emitEvent("join","joined the community",[c.id]); chooseCid(c.id); setInvite(null);
  }

  function exportData(){
    const payload={app:"halaqa",version:3,exportedAt:new Date().toISOString(),members,logs,verifications:verifs};
    const b=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download="halaqa-backup-"+todayStr()+".json";a.click();URL.revokeObjectURL(u);
  }
  async function importData(file){
    try{
      const data=JSON.parse(await file.text());
      const L=data.logs||[],V=data.verifications||[];
      const myL=L.filter(x=>x.memberId===currentUid),myV=V.filter(x=>x.memberId===currentUid);
      if(!confirm("Import your own backup: "+myL.length+" entries and "+myV.length+" verifications? (Only your data is imported.)"))return;
      if(MODE==="firebase"){
        for(const l of myL)await db.collection("logs").doc(l.id).set(l);
        for(const v of myV)await db.collection("verifications").doc(v.id).set(v);
      }else{
        const ll=Object.values(Object.fromEntries([...logs,...myL].map(l=>[l.id,l])));
        const vv=Object.values(Object.fromEntries([...verifs,...myV].map(v=>[v.id,v])));
        setLogs(ll);lsSet(LKEY.logs,ll);setVerifs(vv);lsSet(LKEY.verifs,vv);
      }
      alert("Import complete.");
    }catch(e){alert("That file didn't look like a Halaqa backup.");}
  }

  if(loading) return <Loading/>;
  // signed in but no profile doc yet
  if(MODE==="firebase" && membersLoaded && !members.find(m=>m.id===currentUid))
    return <SetNameScreen onSet={saveName}/>;

  const focus=focusMember?stats.find(s=>s.id===focusMember):null;
  const isGuest=!!props.isGuest;
  const account={onSaveName:saveName,onSignOut:signOut,onExport:exportData,onImport:()=>fileRef.current.click(),email:props.currentEmail,prefs:prefs,onSavePrefs:saveNotifPrefs,isGuest:isGuest,onUpgrade:upgradeGuest};
  const alreadyMember=invite && (invite.members||[]).indexOf(currentUid)>=0;

  return(<div className="wrap">
    <header className="top">
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Star size={34} fill="var(--em)"/>
        <div><h1 className="brand">Halaqa</h1><div className="sub">{selectedCommunity?selectedCommunity.name:"Hifz progress, weighted by length"}</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <Bell events={myEvents} unread={unread} open={bellOpen} splitAt={bellSeenAt!==null?bellSeenAt:seenAt}
          onMarkRead={()=>{setBellSeenAt(Date.now());markNotifSeen();}}
          onToggle={()=>{const nx=!bellOpen;
            if(nx){setBellSeenAt(seenAt);markNotifSeen();}else{setBellSeenAt(null);}
            setBellOpen(nx);}}/>
        <div style={{textAlign:"right"}}><div className="big tnum">{groupPct.toFixed(1)}%</div><div className="sub">{selectedCommunity?"community avg":"—"}</div></div>
      </div>
    </header>

    {MODE==="local" && <div className="banner warn">Local test mode — data stays in this browser only. Add Firebase for real accounts and sharing.</div>}
    {isGuest && <div className="banner warn">
      You're using Halaqa as a <b>guest</b>. Your progress is saved only on this device — clear your browser or switch phones and it's gone.
      <button className="link" style={{marginLeft:8,color:"#7A5B12",fontWeight:600}} onClick={()=>{setFocusMember(null);setTab("me");}}>Create an account to keep it →</button>
    </div>}

    {invite && !alreadyMember && (isGuest
      ? <div className="banner warn">You've been invited to <b>{invite.name}</b>. Create an account to join — your progress will be kept.
          <button className="link" style={{marginLeft:8,color:"#7A5B12",fontWeight:600}} onClick={()=>setTab("me")}>Create account →</button></div>
      : <div className="banner" style={{background:"#EAF3EE",border:"1px solid #BEDBCB",color:"var(--ink)"}}>
      You've been invited to <b>{invite.name}</b>. <button className="btn primary sm" style={{marginLeft:8}} onClick={()=>joinByInvite(invite)}>Join</button>
      <button className="link" style={{marginLeft:10}} onClick={()=>setInvite(null)}>Dismiss</button></div>)}
    {invite && alreadyMember && <div className="banner warn">You're already in {invite.name}. <button className="link" style={{marginLeft:8}} onClick={()=>{chooseCid(invite.id);setInvite(null);setTab("standings");}}>Open it</button></div>}
    {inviteBad && <div className="banner warn">That invite link has expired or is invalid. Ask an admin for a fresh one. <button className="link" style={{marginLeft:8}} onClick={()=>setInviteBad(false)}>Dismiss</button></div>}

    <nav className="tabs">
      {[["standings","Standings"],["log","Log entry"],["activity","Activity"],["communities","Communities"],["me","My profile"]].map(t=>(
        <button key={t[0]} className={"pill"+((tab===t[0]&&!focus)?" active":"")}
          onClick={()=>{setFocusMember(null);setBellOpen(false);setTab(t[0]);}}>{t[1]}</button>))}
    </nav>

    {focus
      ? <MemberDetail s={focus} isSelf={focus.id===currentUid} champions={cChampions}
          onBack={()=>setFocusMember(null)} onRemoveLog={removeLog} onAddVerif={addVerif} onRemoveVerif={removeVerif}/>
      : <React.Fragment>
        {tab==="standings" && <Standings stats={cStats} champions={cChampions} community={selectedCommunity} currentUid={currentUid}
            myComms={myComms} onSelect={chooseCid} onGoCommunities={()=>setTab("communities")} onOpen={setFocusMember}/>}
        {tab==="log" && <LogForm me={me} onAdd={addLog} onAddVerif={addVerif} goStandings={()=>setTab("standings")}/>}
        {tab==="activity" && <Activity logs={logs.filter(l=>commMemberIds.indexOf(l.memberId)>=0)} members={members} currentUid={currentUid} onRemove={removeLog}/>}
        {tab==="communities" && (isGuest
          ? <GuestBlock onGo={()=>setTab("me")}/>
          : <CommunitiesTab currentUid={currentUid} myName={myName} members={members}
            myComms={myComms} pubComms={pubComms} selectedCid={selectedCommunity?selectedCommunity.id:null} isAdmin={isAdmin}
            onSelect={(cid)=>{chooseCid(cid);setTab("standings");}} onCreate={createCommunity} onRequestJoin={requestJoin}
            onCancelRequest={cancelRequest} onLeave={leaveCommunity} onApprove={approveReq} onReject={rejectReq}
            onRemoveMember={removeMemberFromComm} onPromote={promoteAdmin} onSetVisibility={setVisibility}
            onRegenInvite={regenInvite} onRevokeInvite={revokeInvite}/>)}
        {tab==="me" && (me
          ? <MemberDetail s={me} isSelf={true} champions={cChampions} account={account}
              onRemoveLog={removeLog} onAddVerif={addVerif} onRemoveVerif={removeVerif}/>
          : <Loading/>)}
      </React.Fragment>}

    <input ref={fileRef} type="file" accept="application/json" style={{display:"none"}}
      onChange={e=>{if(e.target.files[0]){importData(e.target.files[0]);e.target.value="";}}}/>

    <div className="footer" style={{color:"var(--soft)",borderTop:"1px solid var(--line)",marginTop:40,paddingTop:16,fontSize:11,lineHeight:1.6}}>
      Progress is weighted by letters (huroof): each ayah counts by its share of the Quran's {TOTAL_LETTERS.toLocaleString()} letters. Verification is self-reported — confirmed in person with your own teacher, then recorded here. {MODE==="firebase"?"You can only edit your own entries.":"Add Firebase for real accounts."}
    </div>
  </div>);
}

function SetNameScreen(props){
  const [name,setName]=useState("");
  return(<div className="center"><div className="card authcard">
    <h2 className="serif" style={{color:"var(--ink)",margin:"0 0 10px"}}>One last step</h2>
    <label className="lb">Your name (shown on the board)</label>
    <input className="f" value={name} autoFocus onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&props.onSet(name)}/>
    <button className="btn primary" style={{marginTop:14,width:"100%"}} disabled={!name.trim()} onClick={()=>props.onSet(name)}>Continue</button>
  </div></div>);
}

function Standings(props){
  const stats=props.stats;const [board,setBoard]=useState("completion");
  const comm=props.community;const myComms=props.myComms||[];
  const Switcher = myComms.length>0 ? (
    <div className="row" style={{marginBottom:12,gap:8,alignItems:"center"}}>
      <select className="f" style={{maxWidth:280}} value={comm?comm.id:""} onChange={e=>props.onSelect(e.target.value)}>
        {myComms.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
      <button className="btn sm" onClick={props.onGoCommunities}>Communities</button>
    </div>) : null;
  if(!comm && MODE==="firebase")
    return(<div><Empty title="No community yet" body="Create your own community or join one to see a shared leaderboard. Your personal progress is always on ‘My profile’."/>
      <div style={{textAlign:"center",marginTop:-4}}><button className="btn primary" onClick={props.onGoCommunities}>Go to Communities</button></div></div>);
  if(!stats.length)return(<div>{Switcher}<Empty title="Nothing logged here yet" body="Once members of this community log memorization, the boards fill up."/></div>);
  const B=BOARDS[board];const medal=["#C8962B","#9AA0A6","#A9743C"];
  const sorted=[...stats].sort(B.cmp);
  const unitText=(s)=>typeof B.unit==="function"?B.unit(s):B.unit;
  const champBoardsFor=(id)=>Object.keys(BOARDS).filter(k=>props.champions&&props.champions[k]===id);
  const cTotal=stats.reduce((t,s)=>t+s.memorizedLetters,0)/JUZ_UNIT;
  const cVer=stats.reduce((t,s)=>t+s.verifiedLetters,0)/JUZ_UNIT;
  const cMonth=stats.reduce((t,s)=>t+s.new30,0)/JUZ_UNIT;
  return(<div>
    {Switcher}
    <div className="card" style={{display:"flex",flexWrap:"wrap",gap:"8px 22px",padding:"14px 18px"}}>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--ink)"}}>{cTotal.toFixed(1)}</b> <span className="muted">juz memorized together</span></span>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--brass)"}}>{cVer.toFixed(1)}</b> <span className="muted">juz verified ✓</span></span>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--em)"}}>{cMonth.toFixed(1)}</b> <span className="muted">juz this month</span></span>
    </div>
    <div className="tabs" style={{marginTop:0,marginBottom:14}}>
      {Object.keys(BOARDS).map(k=>(
        <button key={k} className={"pill"+(board===k?" active":"")} style={{fontSize:13,padding:"5px 12px"}}

    </div>
    <div className="muted" style={{fontSize:12,margin:"0 2px 12px"}}>{B.blurb}</div>

    {sorted.map((s,i)=>{const ranked=B.active(s);const rank=ranked?i+1:null;
      return(<button key={s.id} className="card" style={{width:"100%",textAlign:"left",cursor:"pointer",opacity:ranked?1:.6}} onClick={()=>props.onOpen(s.id)}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{position:"relative",width:36,height:36,flexShrink:0}}>
            <Star size={36} fill={ranked&&i<3?medal[i]:"var(--parch2)"} stroke={ranked&&i<3?"none":"var(--line)"}/>
            <span className="serif" style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,fontWeight:600,color:ranked&&i<3?"#fff":"var(--soft)"}}>{rank||"–"}</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8}}>
              <span className="serif" style={{color:"var(--ink)",fontSize:18,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {s.name}{s.pct>=99.9 && <span style={{color:"var(--brass)",fontSize:12,marginLeft:8}}>ḥāfiẓ ★</span>}</span>
              <span style={{textAlign:"right",flexShrink:0,lineHeight:1.1}}>
                <span className="tnum" style={{color:"var(--em)",fontSize:18,fontWeight:600}}>{B.value(s)}</span>
                <span className="muted" style={{display:"block",fontSize:10}}>{unitText(s)}</span>
              </span>
            </div>
            <div className="muted" style={{fontSize:12,marginTop:2}}>
              {B.sub(s)}{board!=="verified" && s.verifiedLetters>0 && <span style={{color:"var(--brass)"}}> · ✓ {s.verifiedPct.toFixed(0)}% verified</span>}
            </div>
            <ChampBadges boards={champBoardsFor(s.id)}/>
          </div>
        </div>
        <div style={{marginTop:12}}><JuzRibbon fractions={s.juzFrac}/></div>
      </button>);})}
  </div>);
}

function UpgradeCard(props){
  const [useEmail,setUseEmail]=useState(true);
  const [email,setEmail]=useState("");const [uname,setUname]=useState("");
  const [pw,setPw]=useState("");const [ack,setAck]=useState(false);
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  async function go(){
    setErr("");
    if(!pw||pw.length<6)return setErr("Password must be at least 6 characters.");
    if(!useEmail && !ack)return setErr("Please tick the box to confirm you understand the password cannot be recovered.");
    setBusy(true);
    try{ await props.onUpgrade(useEmail?"email":"username", useEmail?email:uname, pw); }
    catch(e){ setErr(friendlyAuthError(e)); }
    setBusy(false);
  }
  async function google(){
    setErr("");setBusy(true);
    try{ await signInWithGoogle(); }
    catch(e){ setErr(friendlyAuthError(e)); }
    setBusy(false);
  }
  return(<div className="card" style={{border:"1px solid var(--brass2)"}}>
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>Create your account</h3>
    <div className="muted" style={{fontSize:12,lineHeight:1.5,marginBottom:12}}>
      You're a guest. Create an account to keep your progress safely, use it on other devices, and join communities. <b>Everything you've already logged is kept.</b>
    </div>
    <GoogleButton busy={busy} onClick={google} label="Continue with Google"/>
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
      <span style={{height:1,flex:1,background:"var(--line)"}}/><span className="muted" style={{fontSize:11}}>or</span><span style={{height:1,flex:1,background:"var(--line)"}}/>
    </div>
    <label className="lb">Sign up with</label>
    <div className="row" style={{marginBottom:12,gap:6}}>
      <button className={"pill"+(useEmail?" active":"")} style={{fontSize:13}} onClick={()=>{setUseEmail(true);setErr("");}}>Email</button>
      <button className={"pill"+(!useEmail?" active":"")} style={{fontSize:13}} onClick={()=>{setUseEmail(false);setErr("");}}>Username only</button>
    </div>
    {useEmail
      ? <React.Fragment>
          <label className="lb">Email</label>
          <input className="f" style={{marginBottom:6}} type="email" autoCapitalize="none" value={email} onChange={e=>setEmail(e.target.value)}/>
          <div className="muted" style={{fontSize:11,marginBottom:12}}>Used only for password recovery. Never shown on the board.</div>
        </React.Fragment>
      : <React.Fragment>
          <label className="lb">Username</label>
          <input className="f" style={{marginBottom:8}} autoCapitalize="none" value={uname} placeholder="e.g. abu_darda" onChange={e=>setUname(e.target.value)}/>
          <div style={{background:"#FBF3DF",border:"1px solid #E6D39B",color:"#7A5B12",borderRadius:8,padding:"10px 12px",fontSize:12,lineHeight:1.5,marginBottom:10}}>
            <b>Please read.</b> With no email there is <b>no way to recover your password</b> if you forget it — your account and all progress would be lost permanently.
            <label style={{display:"flex",alignItems:"flex-start",gap:8,marginTop:8}}>
              <input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)} style={{marginTop:3}}/>
              <span>I understand my password cannot be recovered.</span>
            </label>
          </div>
        </React.Fragment>}
    <label className="lb">Password</label>
    <input className="f" type="password" value={pw} onChange={e=>setPw(e.target.value)}/>
    {err && <div style={{color:"var(--danger)",fontSize:12,marginTop:10}}>{err}</div>}
    <button className="btn primary" style={{marginTop:14}} disabled={busy} onClick={go}>{busy?"…":"Create account & keep my progress"}</button>
  </div>);
}

function VerificationCard(props){
  const {s,isSelf}=props;
  const [surah,setSurah]=useState(1);const [from,setFrom]=useState(1);const [to,setTo]=useState(AYAHS[0]);
  const [by,setBy]=useState("");const [err,setErr]=useState("");
  const maxA=AYAHS[surah-1];
  function pick(n){n=Number(n);setSurah(n);setFrom(1);setTo(AYAHS[n-1]);}
  function add(){setErr("");const f=Number(from),t=Number(to);
    if(f<1||t<1||f>maxA||t>maxA||f>t)return setErr("Enter a valid ayah range for "+NAMES[surah-1]+".");
    props.onAdd({surah,from:f,to:t,by:by.trim(),date:todayStr()});setBy("");}
  const list=[...(s.verifs||[])].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  return(<div className="card">
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>Verified by teacher <span className="muted" style={{fontSize:12,fontWeight:400}}>· ✓ {s.verifiedPct.toFixed(1)}%</span></h3>
    <div className="muted" style={{fontSize:12,marginBottom:12,lineHeight:1.5}}>
      {isSelf?"After you recite a portion to your local imam/teacher and they confirm it, record it here. It's counted only where it overlaps what you've memorized.":"Portions this person had confirmed by their local teacher."}
    </div>
    {isSelf && <div style={{marginBottom:12}}>
      <div className="row" style={{marginBottom:8}}>
        <button className="btn sm" onClick={()=>pick(Math.max(1,surah-1))} disabled={surah<=1} style={surah<=1?{opacity:.4}:{}}>←</button>
        <select className="f" value={surah} onChange={e=>pick(e.target.value)}>
          {NAMES.map((nm,i)=><option key={i} value={i+1}>{i+1} · {nm} ({AYAHS[i]})</option>)}
        </select>
        <button className="btn sm" onClick={()=>pick(Math.min(114,surah+1))} disabled={surah>=114} style={surah>=114?{opacity:.4}:{}}>→</button>
      </div>
      <div className="grid2" style={{marginBottom:8}}>
        <div><label className="lb">From ayah</label><input className="f" type="number" min="1" max={maxA} value={from} onChange={e=>setFrom(e.target.value)}/></div>
        <div><label className="lb">To ayah</label><input className="f" type="number" min="1" max={maxA} value={to} onChange={e=>setTo(e.target.value)}/></div>
      </div>
      <label className="lb">Verified by (teacher / mosque — optional)</label>
      <input className="f" style={{marginBottom:8}} value={by} placeholder="e.g. Imam ___, ___ Masjid" onChange={e=>setBy(e.target.value)}/>
      {err && <div style={{color:"var(--danger)",fontSize:12,marginBottom:8}}>{err}</div>}
      <div className="row"><button className="btn sm" style={{color:"var(--brass)"}} onClick={()=>{setFrom(1);setTo(maxA);}}>Whole surah</button>
        <button className="btn primary sm" onClick={add}>Add verification ✓</button></div>
    </div>}
    {list.length===0 && <div className="muted" style={{fontSize:13}}>Nothing verified yet.</div>}
    {list.map(v=>(<div key={v.id} className="entryrow">
      <span style={{color:"var(--brass)",fontSize:14,flexShrink:0}}>✓</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14}}>{NAMES[v.surah-1]} {v.from}{v.to!==v.from?"–"+v.to:""}</div>
        <div className="muted" style={{fontSize:12}}>{v.by?v.by+" · ":""}{v.date?prettyDate(v.date):""}</div>
      </div>
      {isSelf && <button className="link" style={{color:"var(--danger)"}} onClick={()=>{if(confirm("Remove this verification?"))props.onRemove(v.id);}}>Remove</button>}
    </div>))}
  </div>);
}

function LogForm(props){
  const me=props.me;
  const [type,setType]=useState("new");const [surah,setSurah]=useState(1);
  const [from,setFrom]=useState(1);const [to,setTo]=useState(AYAHS[0]);
  const [date,setDate]=useState(todayStr());const [err,setErr]=useState("");const [savedInfo,setSavedInfo]=useState(null);
  const [alsoVerified,setAlsoVerified]=useState(false);const [verBy,setVerBy]=useState("");
  const maxA=AYAHS[surah-1];
  function goSurah(n){n=Math.min(114,Math.max(1,n));setSurah(n);setFrom(1);setTo(AYAHS[n-1]);setSavedInfo(null);setErr("");}
  function submit(){setErr("");const f=Number(from),t=Number(to);
    if(!f||!t||f<1||t<1||f>maxA||t>maxA)return setErr("Ayah must be between 1 and "+maxA+" for "+NAMES[surah-1]+".");
    if(f>t)return setErr("The starting ayah can't be after the ending ayah.");
    props.onAdd({type,surah,from:f,to:t,date});
    if(type==="new"&&alsoVerified&&props.onAddVerif)props.onAddVerif({surah,from:f,to:t,by:verBy.trim(),date});
    setSavedInfo({surah});setAlsoVerified(false);setVerBy("");}
  return(<div className="card">
    <h2 className="serif" style={{color:"var(--ink)",fontSize:20,margin:"0 0 4px"}}>Log a portion</h2>
    <div className="muted" style={{fontSize:12,marginBottom:16}}>Logging for <b style={{color:"var(--text)"}}>{me?me.name:"you"}</b> — only you can add to your own record.</div>

    <div className="row" style={{marginBottom:16}}>
      {[["new","New memorization","var(--em)"],["rev","Revision","var(--brass)"]].map(o=>(
        <button key={o[0]} className="btn" style={type===o[0]?{background:o[2],color:"var(--parch)",borderColor:o[2]}:{}} onClick={()=>setType(o[0])}>{o[1]}</button>))}
    </div>

    <label className="lb">Surah</label>
    <div className="row" style={{marginBottom:8}}>
      <button className="btn sm" onClick={()=>goSurah(surah-1)} disabled={surah<=1} style={surah<=1?{opacity:.4}:{}}>← Prev</button>
      <select className="f" value={surah} onChange={e=>goSurah(Number(e.target.value))}>
        {NAMES.map((nm,i)=><option key={i} value={i+1}>{i+1} · {nm} ({AYAHS[i]} ayahs)</option>)}
      </select>
      <button className="btn sm" onClick={()=>goSurah(surah+1)} disabled={surah>=114} style={surah>=114?{opacity:.4}:{}}>Next →</button>
    </div>
    <div className="grid2" style={{marginBottom:12}}>
      <div><label className="lb">From ayah</label><input className="f" type="number" min="1" max={maxA} value={from} onChange={e=>setFrom(e.target.value)}/></div>
      <div><label className="lb">To ayah</label><input className="f" type="number" min="1" max={maxA} value={to} onChange={e=>setTo(e.target.value)}/></div>
    </div>
    <button className="btn sm" style={{color:"var(--em)",marginBottom:16}} onClick={()=>{setFrom(1);setTo(maxA);}}>Whole surah</button>
    <label className="lb">Date</label>
    <input className="f" style={{marginBottom:16}} type="date" max={todayStr()} value={date} onChange={e=>setDate(e.target.value)}/>
    {type==="new" && <div style={{marginBottom:16,padding:"10px 12px",background:"var(--parch)",border:"1px solid var(--line)",borderRadius:8}}>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--text)"}}>
        <input type="checkbox" checked={alsoVerified} onChange={e=>setAlsoVerified(e.target.checked)}/>
        ✓ Also mark this range as verified by my teacher
      </label>
      {alsoVerified && <input className="f" style={{marginTop:8,fontSize:13}} value={verBy} placeholder="Verified by (teacher / mosque — optional)" onChange={e=>setVerBy(e.target.value)}/>}
    </div>}
    {err && <div style={{color:"var(--danger)",fontSize:12,marginBottom:12}}>{err}</div>}
    {!savedInfo
      ? <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button className="btn primary" onClick={submit}>Save entry</button>
          <button className="link" style={{marginLeft:"auto"}} onClick={props.goStandings}>See standings</button></div>
      : <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{color:"var(--em)",fontSize:14}}>Saved ✓</span>
          {savedInfo.surah<114 && <button className="btn primary sm" onClick={()=>goSurah(savedInfo.surah+1)}>Log next: {savedInfo.surah+1} · {NAMES[savedInfo.surah]} →</button>}
          <button className="btn sm" onClick={()=>setSavedInfo(null)}>Log more here</button>
          <button className="link" style={{marginLeft:"auto"}} onClick={props.goStandings}>See standings</button></div>}
  </div>);
}

function Activity(props){
  const nameOf=id=>(props.members.find(m=>m.id===id)||{}).name||"Unknown";
  const sorted=[...props.logs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(!sorted.length)return <Empty title="No entries yet" body="Logged portions from everyone show up here."/>;
  return(<div>{sorted.map(l=>{const own=l.memberId===props.currentUid;
    return(<div key={l.id} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px"}}>
      <Star size={18} fill={l.type==="rev"?"var(--brass2)":"var(--em2)"}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14}}>
          <span className="serif" style={{color:"var(--ink)"}}>{nameOf(l.memberId)}</span>
          <span style={{color:l.type==="rev"?"var(--brass)":"var(--em)"}}> {l.type==="rev"?"revised":"memorized"} </span>
          {NAMES[l.surah-1]} {l.from}{l.to!==l.from?"–"+l.to:""}
        </div>
        <div className="muted" style={{fontSize:12}}>{prettyDate(l.date)}</div>
      </div>
      {own && <button className="link" onClick={()=>{if(confirm("Delete this entry?"))props.onRemove(l.id);}} aria-label="Delete">✕</button>}
    </div>);})}</div>);
}

function NotifRow(props){
  const e=props.e;
  return(<div style={{padding:"8px",borderTop:"1px solid var(--line)",fontSize:13,
    background:props.isNew?"rgba(28,107,82,0.05)":"transparent"}}>
    <div style={{display:"flex",gap:6}}>
      <span style={{flex:1,minWidth:0}}>
        <b className="serif" style={{color:"var(--ink)"}}>{e.actorName}</b> {e.text}
      </span>
      {props.isNew && <span style={{width:6,height:6,borderRadius:3,background:"var(--em)",flexShrink:0,marginTop:5}}/>}
    </div>
    <div className="muted" style={{fontSize:11,marginTop:3,textAlign:"right"}}>{timeAgo(e.createdAt)}</div>
  </div>);
}

function Bell(props){
  const {events,unread,open,splitAt}=props;
  const fresh=events.filter(e=>e.createdAt>splitAt);
  const earlier=events.filter(e=>e.createdAt<=splitAt);
  const Hdr=(t)=>(<div className="muted" style={{fontSize:10,letterSpacing:".06em",textTransform:"uppercase",
    padding:"8px 8px 2px",fontWeight:600}}>{t}</div>);
  return(<div style={{position:"relative"}}>
    <button onClick={props.onToggle} title="Notifications" style={{background:"none",border:"none",cursor:"pointer",position:"relative",padding:4}}>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      {unread>0 && <span style={{position:"absolute",top:0,right:0,background:"var(--danger)",color:"#fff",fontSize:10,
        minWidth:16,height:16,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{unread>9?"9+":unread}</span>}
    </button>
    {open && <div style={{position:"absolute",right:0,top:34,width:310,maxHeight:400,overflowY:"auto",zIndex:20,
      background:"var(--card)",border:"1px solid var(--line)",borderRadius:12,boxShadow:"0 6px 24px rgba(0,0,0,.12)",padding:8}}>
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",padding:"4px 8px 6px"}}>
        <span className="serif" style={{color:"var(--ink)",fontSize:15}}>Notifications</span>
        {fresh.length>0 && <button className="link" style={{fontSize:11}} onClick={props.onMarkRead}>Mark all as read</button>}
      </div>
      {events.length===0 && <div className="muted" style={{fontSize:13,padding:"8px"}}>Nothing yet. Activity from your communities appears here.</div>}
      {fresh.length>0 && Hdr("New")}
      {fresh.map(e=><NotifRow key={e.id} e={e} isNew={true}/>)}
      {earlier.length>0 && Hdr("Earlier")}
      {earlier.map(e=><NotifRow key={e.id} e={e} isNew={false}/>)}
      {events.length>0 && <div className="muted" style={{fontSize:10,padding:"8px 8px 2px",textAlign:"center",borderTop:"1px solid var(--line)",marginTop:4}}>
        Showing the latest {events.length}. Notifications older than 14 days are cleared.</div>}
    </div>}
  </div>);
}

function inviteLink(c){return window.location.origin+window.location.pathname+"?join="+c.id+"&code="+c.inviteCode;}
function inviteActive(c){return c.inviteExpiresAt && Date.now()<c.inviteExpiresAt;}

function CommunitiesTab(props){
  const {currentUid,myComms,pubComms,members,isAdmin}=props;
  const [openAdmin,setOpenAdmin]=useState(null);
  const [requested,setRequested]=useState({});
  const nameOf=(id)=>(members.find(m=>m.id===id)||{}).name||"Member";
  const myIds=myComms.map(c=>c.id);
  const discover=pubComms.filter(c=>myIds.indexOf(c.id)<0);
  return(<div>
    <div className="card">
      <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>Your communities</h3>
      {myComms.length===0 && <div className="muted" style={{fontSize:13,marginBottom:6}}>You're not in any community yet. Create one below, or join a public one.</div>}
      {myComms.map(c=>{const admin=isAdmin(c);const active=props.selectedCid===c.id;
        return(<div key={c.id} style={{borderBottom:"1px solid var(--line)",padding:"10px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <button className="btn sm" style={active?{background:"var(--em)",color:"var(--parch)",borderColor:"var(--em)"}:{}} onClick={()=>props.onSelect(c.id)}>{active?"Viewing":"View"}</button>
            <span className="serif" style={{color:"var(--ink)",fontSize:16}}>{c.name}</span>
            <span className="muted" style={{fontSize:11,border:"1px solid var(--line)",borderRadius:999,padding:"1px 8px"}}>{c.visibility}</span>
            {admin && <span style={{fontSize:11,color:"var(--brass)",border:"1px solid var(--brass2)",borderRadius:999,padding:"1px 8px"}}>admin</span>}
            <span className="muted" style={{fontSize:12}}>{(c.members||[]).length} member{(c.members||[]).length===1?"":"s"}</span>
            <span style={{marginLeft:"auto",display:"flex",gap:10}}>
              {admin && <button className="link" onClick={()=>setOpenAdmin(openAdmin===c.id?null:c.id)}>{openAdmin===c.id?"Close":"Manage"}</button>}
              <button className="link" style={{color:"var(--danger)"}} onClick={()=>{if(confirm("Leave "+c.name+"?"+(isAdmin(c)&&(c.admins||[]).length===1?" Admin will pass to the next member.":"")))props.onLeave(c);}}>Leave</button>
            </span>
          </div>
          {c.description && <div className="muted" style={{fontSize:12,marginTop:4}}>{c.description}</div>}
          {admin && openAdmin===c.id && <AdminPanel c={c} currentUid={currentUid} nameOf={nameOf}
            onApprove={props.onApprove} onReject={props.onReject} onRemoveMember={props.onRemoveMember} onPromote={props.onPromote}
            onSetVisibility={props.onSetVisibility} onRegenInvite={props.onRegenInvite} onRevokeInvite={props.onRevokeInvite}/>}
        </div>);})}
    </div>

    <CreateCommunity canSeed={myComms.length===0} memberCount={members.length} onCreate={props.onCreate}/>

    <div className="card">
      <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>Discover public communities</h3>
      {discover.length===0 && <div className="muted" style={{fontSize:13}}>No public communities to join right now.</div>}
      {discover.map(c=>(<div key={c.id} style={{borderBottom:"1px solid var(--line)",padding:"10px 0",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:0}}>
          <div className="serif" style={{color:"var(--ink)",fontSize:16}}>{c.name}</div>
          {c.description && <div className="muted" style={{fontSize:12}}>{c.description}</div>}
          <div className="muted" style={{fontSize:11}}>{(c.members||[]).length} members</div>
        </div>
        {requested[c.id]
          ? <button className="btn sm" onClick={()=>{props.onCancelRequest(c);setRequested(r=>({...r,[c.id]:false}));}}>Requested — cancel</button>
          : <button className="btn primary sm" onClick={()=>{props.onRequestJoin(c);setRequested(r=>({...r,[c.id]:true}));}}>Request to join</button>}
      </div>))}
      <div className="muted" style={{fontSize:11,marginTop:8,lineHeight:1.5}}>Secret communities don't appear here — join them only through an invite link. Public ones need an admin to approve your request.</div>
    </div>
  </div>);
}

function CreateCommunity(props){
  const [name,setName]=useState("");const [desc,setDesc]=useState("");const [vis,setVis]=useState("secret");const [seed,setSeed]=useState(false);const [busy,setBusy]=useState(false);
  async function go(){if(!name.trim())return;setBusy(true);try{await props.onCreate(name,desc,vis,seed);setName("");setDesc("");setSeed(false);}catch(e){alert(e.message||e);}setBusy(false);}
  return(<div className="card">
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 12px"}}>Create a community</h3>
    <label className="lb">Name</label>
    <input className="f" style={{marginBottom:12}} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Our Circle"/>
    <label className="lb">Description (shown to people deciding whether to join)</label>
    <input className="f" style={{marginBottom:12}} value={desc} onChange={e=>setDesc(e.target.value)}/>
    <label className="lb">Visibility</label>
    <select className="f" style={{marginBottom:12}} value={vis} onChange={e=>setVis(e.target.value)}>
      <option value="secret">Secret — hidden; join only by invite link</option>
      <option value="public">Public — discoverable; join by request + admin approval</option>
    </select>
    {props.canSeed && <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,marginBottom:12,color:"var(--text)"}}>
      <input type="checkbox" checked={seed} onChange={e=>setSeed(e.target.checked)}/>
      Add all {props.memberCount} current app users to this community (use this for your starting community)
    </label>}
    <button className="btn primary" disabled={busy||!name.trim()} onClick={go}>{busy?"…":"Create community"}</button>
  </div>);
}

function AdminPanel(props){
  const c=props.c;const [reqs,setReqs]=useState([]);const [copied,setCopied]=useState(false);
  useEffect(()=>{ if(MODE!=="firebase")return;
    return db.collection("communities").doc(c.id).collection("requests").onSnapshot(s=>setReqs(s.docs.map(d=>d.data())),()=>{});
  },[c.id]);
  const admins=c.admins||[];const memberIds=c.members||[];const active=inviteActive(c);const link=inviteLink(c);
  function copy(){try{navigator.clipboard.writeText(link);setCopied(true);setTimeout(()=>setCopied(false),1500);}catch(e){}}
  return(<div style={{marginTop:10,background:"var(--parch)",border:"1px solid var(--line)",borderRadius:10,padding:12}}>
    {/* visibility */}
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
      <span className="serif" style={{color:"var(--ink)",fontSize:15}}>Visibility</span>
      <select className="f" style={{maxWidth:320}} value={c.visibility} onChange={e=>props.onSetVisibility(c,e.target.value)}>
        <option value="secret">Secret — hidden; invite only</option>
        <option value="public">Public — discoverable; request + approval</option>
      </select>
    </div>
    {/* invite link */}
    <div style={{marginBottom:12}}>
      <div className="serif" style={{color:"var(--ink)",fontSize:15,marginBottom:4}}>Invite link</div>
      {active
        ? <div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
              <input className="f" readOnly value={link} style={{fontSize:11,padding:"6px 8px"}} onFocus={e=>e.target.select()}/>
              <button className="btn sm" onClick={copy}>{copied?"Copied":"Copy"}</button>
            </div>
            <div className="muted" style={{fontSize:11}}>Code <b style={{color:"var(--brass)"}}>{c.inviteCode}</b> · expires {new Date(c.inviteExpiresAt).toLocaleDateString()}
              <button className="link" style={{marginLeft:10}} onClick={()=>props.onRegenInvite(c)}>Regenerate</button>
              <button className="link" style={{marginLeft:10,color:"var(--danger)"}} onClick={()=>props.onRevokeInvite(c)}>Revoke</button></div>
          </div>
        : <div className="muted" style={{fontSize:12}}>No active invite link. <button className="link" onClick={()=>props.onRegenInvite(c)}>Generate one (valid 1 week)</button></div>}
    </div>
    {/* requests */}
    <div className="serif" style={{color:"var(--ink)",fontSize:15,marginBottom:6}}>Join requests</div>
    {reqs.length===0 && <div className="muted" style={{fontSize:12,marginBottom:8}}>No pending requests.</div>}
    {reqs.map(r=>(<div key={r.memberId} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
      <span style={{flex:1,fontSize:13}}>{r.name||props.nameOf(r.memberId)}</span>
      <button className="btn primary sm" onClick={()=>props.onApprove(c.id,r.memberId)}>Approve</button>
      <button className="btn sm" style={{color:"var(--danger)"}} onClick={()=>props.onReject(c.id,r.memberId)}>Reject</button>
    </div>))}
    {/* members */}
    <div className="serif" style={{color:"var(--ink)",fontSize:15,margin:"12px 0 6px"}}>Members</div>
    {memberIds.map(mid=>(<div key={mid} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
      <span style={{flex:1,fontSize:13}}>{props.nameOf(mid)}{admins.indexOf(mid)>=0 && <span style={{color:"var(--brass)",fontSize:11}}> · admin</span>}{mid===props.currentUid && <span className="muted" style={{fontSize:11}}> · you</span>}</span>
      {admins.indexOf(mid)<0 && <button className="btn sm" onClick={()=>props.onPromote(c,mid)}>Make admin</button>}
      {mid!==props.currentUid && <button className="btn sm" style={{color:"var(--danger)"}} onClick={()=>{if(confirm("Remove "+props.nameOf(mid)+"?"))props.onRemoveMember(c,mid);}}>Remove</button>}
    </div>))}
  </div>);
}

function Empty(props){
  return(<div className="card dash" style={{textAlign:"center",padding:32}}>
    <div style={{opacity:.4,display:"flex",justifyContent:"center",marginBottom:12}}><Star size={28}/></div>
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:0}}>{props.title}</h3>
    <div className="muted" style={{fontSize:14,marginTop:4,maxWidth:360,marginLeft:"auto",marginRight:"auto"}}>{props.body}</div>
  </div>);
}

try{ ReactDOM.createRoot(document.getElementById("root")).render(<Root/>); }
catch(e){ var el=document.getElementById("err"); if(el) el.textContent="Startup error: "+(e&&e.message?e.message:e); }
</script>
</body>
</html>
