<style>
  :root{
    --parch:#F4EFE2; --parch2:#ECE4D1; --card:#FBF8EF; --ink:#13322A;
    --em:#1C6B52; --em2:#2E8B6B; --brass:#B5872E; --brass2:#D9B45E;
    --text:#241F17; --soft:#736B57; --line:#DBD2BB; --danger:#A9402C;
    --serif:Georgia,"Iowan Old Style","Palatino Linotype",serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--parch);color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:24px 20px}
  .serif{font-family:var(--serif)}
  .tnum{font-variant-numeric:tabular-nums}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding-bottom:20px;border-bottom:2px solid var(--line)}
  h1.brand{font-family:var(--serif);color:var(--ink);font-size:30px;line-height:1;margin:0;letter-spacing:-.5px}
  .sub{color:var(--soft);font-size:12px;margin-top:5px}
  .big{font-family:var(--serif);color:var(--em);font-size:30px;line-height:1}
  nav.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:20px 0 24px}
  .pill{font-family:var(--serif);font-size:14px;padding:6px 14px;border-radius:999px;
    border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;transition:.15s}
  .pill.active{background:var(--em);color:var(--parch);border-color:var(--em)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:12px}
  .card.dash{background:transparent;border-style:dashed}
  .btn{font-family:var(--serif);font-size:14px;padding:8px 18px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--ink);cursor:pointer}
  .btn.primary{background:var(--em);color:var(--parch);border-color:var(--em)}
  .btn.sm{font-size:12px;padding:4px 12px}
  label.lb{display:block;color:var(--soft);font-size:12px;margin-bottom:4px}
  input.f,select.f{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--line);
    background:#fff;color:var(--text);font-size:14px;font-family:inherit}
  .row{display:flex;gap:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ribbon{display:flex;gap:1px;width:100%}
  .cell{flex:1;border-radius:1px;background:var(--parch2);border:1px solid var(--line);overflow:hidden;position:relative}
  .cell>i{position:absolute;left:0;right:0;bottom:0;display:block}
  .bar{flex:1;height:8px;border-radius:4px;background:var(--parch2);border:1px solid var(--line);overflow:hidden;position:relative}
  .bar>i{display:block;height:100%;position:absolute;left:0;top:0}
  .muted{color:var(--soft)}
  .banner{border-radius:10px;padding:12px 16px;font-size:13px;margin-top:16px;line-height:1.5}
  .banner.warn{background:#FBF3DF;color:#7A5B12;border:1px solid #E6D39B}
  .entryrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .entryrow:last-child{border-bottom:none}
  .surahrow{display:flex;align-items:center;gap:8px}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .authcard{max-width:400px;width:100%}
  .link{color:var(--soft);text-decoration:underline;text-underline-offset:2px;cursor:pointer;background:none;border:none;font-size:13px;padding:0}
  .spin{animation:sp 1.4s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root">
  <div id="boot" style="max-width:760px;margin:48px auto;padding:0 20px;font-family:system-ui,sans-serif;color:#736B57;line-height:1.6">
    Loading Halaqa…
    <div style="font-size:13px;margin-top:8px">If this stays more than a few seconds, the app couldn't load its libraries — check your internet connection or try the hosted link.</div>
  </div>
</div>
<pre id="err" style="max-width:760px;margin:0 auto;padding:0 20px;white-space:pre-wrap;color:#A9402C;font-size:12px;font-family:system-ui,sans-serif"></pre>
<script>
  window.addEventListener('error', function (e) {
    var el = document.getElementById('err');
    if (el) el.textContent += '\n• ' + (e.message || (e.error && e.error.message) || e.type || 'unknown error');
  });
  setTimeout(function () {
    if (document.getElementById('boot')) {
      var ok = (typeof React !== 'undefined') && (typeof ReactDOM !== 'undefined') && (typeof Babel !== 'undefined');
      var el = document.getElementById('err');
      if (el && !ok) el.textContent = 'Could not load React/Babel from the internet. Try another network, or open the hosted GitHub Pages link.';
    }
  }, 8000);
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* ══════════════════════════════════════════════════════════════════════════
   1) LEVEL A — shared passphrase. Change this, and give it to your circle
      personally. Set it to "" to turn the gate off.
   ══════════════════════════════════════════════════════════════════════════ */
const APP_PASSPHRASE = "tgt_hifz";

/* ══════════════════════════════════════════════════════════════════════════
   2) YOUR CLOUD DATABASE — paste your Firebase config below (see setup guide).
      Real accounts (Level B) need Firebase. Without it, the app runs in a
      single-device local mode for testing only.
   ══════════════════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDFHkgweViGTpyWMCRXA7wscKqyTFYaXVw",
  authDomain: "hifz-group.firebaseapp.com",
  projectId: "hifz-group",
  storageBucket: "hifz-group.firebasestorage.app",
  messagingSenderId: "831824157580",
  appId: "1:831824157580:web:a2d3679ce2543d66ec54a9"
};
const FIREBASE_READY = !String(FIREBASE_CONFIG.projectId).includes("PASTE") && !!window.firebase;
let db=null, auth=null;
if (FIREBASE_READY){ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.firestore(); auth=firebase.auth(); }
const MODE = FIREBASE_READY ? "firebase" : "local";

/* ── Quran reference data (letters = length weight; Abbawi/Noon, Rasm Uthmani) ── */
const NAMES=["Al-Fatihah","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
const AYAHS=[7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];
const LETTERS=[139,25900,14762,16085,12032,12571,14245,5349,10954,7521,7726,7203,3500,3497,2829,7723,6565,6488,3868,5338,4980,5237,4399,5664,3825,5573,4747,5861,4256,3434,2134,1542,5675,3549,3184,3020,3828,3018,4786,5041,3336,3471,3553,1455,2050,2627,2389,2479,1508,1488,1523,1305,1422,1461,1657,1719,2505,2011,1931,1542,945,755,787,1072,1184,1074,1330,1264,1113,951,953,1096,850,1024,668,1078,821,778,772,546,431,329,744,440,463,252,296,380,575,338,250,314,166,102,157,285,112,397,156,164,158,123,71,134,96,75,114,42,95,80,81,47,71,80];
const JUZ_STARTS=[[1,1],[2,142],[2,253],[3,93],[4,24],[4,148],[5,82],[6,111],[7,88],[8,41],[9,93],[11,6],[12,53],[15,1],[17,1],[18,75],[21,1],[23,1],[25,21],[27,56],[29,46],[33,31],[36,28],[39,32],[41,47],[46,1],[51,31],[58,1],[67,1],[78,1]];

const perAyah=(s)=>LETTERS[s-1]/AYAHS[s-1];
const TOTAL_LETTERS=LETTERS.reduce((a,b)=>a+b,0);
const JUZ_UNIT=TOTAL_LETTERS/30;
const CUM=(()=>{const c=[0];for(let i=0;i<114;i++)c.push(c[i]+AYAHS[i]);return c;})();
const gIdx=(s,a)=>CUM[s-1]+a;
function gToSA(g){for(let s=1;s<=114;s++)if(g<=CUM[s])return{s,a:g-CUM[s-1]};return{s:114,a:6};}
const JUZ=(()=>{const out=[];for(let j=0;j<30;j++){const startG=gIdx(JUZ_STARTS[j][0],JUZ_STARTS[j][1]);
  const endG=j<29?gIdx(JUZ_STARTS[j+1][0],JUZ_STARTS[j+1][1])-1:gIdx(114,6);const segs=[];let g=startG;
  while(g<=endG){const o=gToSA(g);const surahEndG=CUM[o.s];const segEndG=Math.min(endG,surahEndG);
    segs.push({surah:o.s,from:o.a,to:segEndG-CUM[o.s-1]});g=segEndG+1;}
  const letters=segs.reduce((t,x)=>t+(x.to-x.from+1)*perAyah(x.surah),0);out.push({num:j+1,segs,letters});}return out;})();

function mergeIntervals(list){if(!list.length)return[];const s=[...list].sort((a,b)=>a[0]-b[0]);const out=[s[0].slice()];
  for(let i=1;i<s.length;i++){const last=out[out.length-1];if(s[i][0]<=last[1]+1)last[1]=Math.max(last[1],s[i][1]);else out.push(s[i].slice());}return out;}
const countAyahs=(m)=>m.reduce((t,x)=>t+(x[1]-x[0]+1),0);
function overlapCount(m,from,to){let n=0;for(const x of m)n+=Math.max(0,Math.min(x[1],to)-Math.max(x[0],from)+1);return n;}
function intersectCount(A,B){let n=0;for(const x of A)n+=overlapCount(B,x[0],x[1]);return n;}

const todayStr=()=>new Date().toISOString().slice(0,10);
function dateNDaysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function currentStreak(dates){if(!dates.length)return 0;const set=new Set(dates);let anchor=todayStr();
  if(!set.has(anchor)){const y=new Date();y.setDate(y.getDate()-1);anchor=y.toISOString().slice(0,10);if(!set.has(anchor))return 0;}
  let n=0,cur=new Date(anchor);while(set.has(cur.toISOString().slice(0,10))){n++;cur.setDate(cur.getDate()-1);}return n;}
function prettyDate(d){const diff=Math.round((new Date(todayStr())-new Date(d))/86400000);
  if(diff===0)return"Today";if(diff===1)return"Yesterday";return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}
const uid=()=>(crypto&&crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random().toString(36).slice(2));

const LKEY={members:"halaqa_members",logs:"halaqa_logs",verifs:"halaqa_verifs",me:"halaqa_me"};
const lsGet=(k)=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};

function computeMember(member,logs,verifs){
  const mine=logs.filter(l=>l.memberId===member.id);
  const newBy={},revBy={},dates=[];let lastRevised=null;
  mine.forEach(l=>{dates.push(l.date);const b=l.type==="rev"?revBy:newBy;(b[l.surah]=b[l.surah]||[]).push([l.from,l.to]);
    if(l.type==="rev"&&(!lastRevised||l.date>lastRevised))lastRevised=l.date;});
  const mergedNew={};for(const s in newBy)mergedNew[s]=mergeIntervals(newBy[s]);
  let memorizedLetters=0;const surahPct={};
  for(let s=1;s<=114;s++){const merged=mergedNew[s]||[];const ay=countAyahs(merged);memorizedLetters+=ay*perAyah(s);
    surahPct[s]={ayahs:ay,pct:ay/AYAHS[s-1],verified:0};}
  const juzFrac=JUZ.map(jz=>{let mem=0;jz.segs.forEach(seg=>{const merged=mergedNew[seg.surah]||[];
    mem+=overlapCount(merged,seg.from,seg.to)*perAyah(seg.surah);});return jz.letters?mem/jz.letters:0;});
  let revisedLetters=0;for(const s in revBy)revBy[s].forEach(x=>{revisedLetters+=(x[1]-x[0]+1)*perAyah(s);});
  const c7=dateNDaysAgo(7),c30=dateNDaysAgo(30);let new7=0,new30=0;
  mine.forEach(l=>{if(l.type!=="rev"){const w=(l.to-l.from+1)*perAyah(l.surah);if(l.date>=c7)new7+=w;if(l.date>=c30)new30+=w;}});
  // verification (self-reported; counted only where it overlaps memorized)
  const myVer=verifs.filter(v=>v.memberId===member.id);
  const verBy={};myVer.forEach(v=>{(verBy[v.surah]=verBy[v.surah]||[]).push([v.from,v.to]);});
  let verifiedLetters=0;
  for(const s in verBy){const mergedV=mergeIntervals(verBy[s]);const cnt=intersectCount(mergedV,mergedNew[s]||[]);
    verifiedLetters+=cnt*perAyah(s);if(surahPct[s])surahPct[s].verified=cnt;}
  return{...member,memorizedLetters,pct:Math.min(100,(memorizedLetters/TOTAL_LETTERS)*100),surahPct,juzFrac,
    juzDone:juzFrac.filter(f=>f>=0.999).length,juzEquiv:juzFrac.reduce((a,b)=>a+b,0),
    revisedLetters,revSessions:mine.filter(l=>l.type==="rev").length,streak:currentStreak(dates),
    activeDays:new Set(dates).size,new7,new30,verifiedLetters,verifiedPct:(verifiedLetters/TOTAL_LETTERS)*100,
    verifs:myVer,lastActive:dates.length?dates.reduce((a,b)=>a>b?a:b):null,lastRevised};
}

function Star(props){const size=props.size||24,fill=props.fill||"#B5872E",stroke=props.stroke||"none";
  return(<svg width={size} height={size} viewBox="0 0 100 100" aria-hidden="true">
    <rect x="22" y="22" width="56" height="56" rx="4" fill={fill} stroke={stroke}/>
    <rect x="22" y="22" width="56" height="56" rx="4" fill={fill} stroke={stroke} transform="rotate(45 50 50)"/>
  </svg>);}
function JuzRibbon(props){const h=props.height||10;
  return(<div className="ribbon" title="30 juz">{props.fractions.map((f,i)=>(
    <div key={i} className="cell" style={{height:h}}>
      <i style={{height:Math.round(f*100)+"%",background:f>=0.999?"var(--em)":"var(--em2)"}}/>
    </div>))}</div>);}
function ChampBadges(props){const boards=props.boards||[];if(!boards.length)return null;
  return(<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginTop:6}}>
    {props.label && <span className="muted" style={{fontSize:11}}>{props.label}</span>}
    {boards.map(k=><span key={k} style={{fontSize:10,color:"var(--brass)",border:"1px solid var(--brass2)",
      borderRadius:999,padding:"2px 8px",whiteSpace:"nowrap"}}>🏆 {BOARDS[k].label}</span>)}
  </div>);}

const BOARDS={
  completion:{label:"Completion",blurb:"Most of the Quran memorized, weighted by length.",
    cmp:(a,b)=>b.memorizedLetters-a.memorizedLetters||b.juzEquiv-a.juzEquiv,
    value:(s)=>s.pct.toFixed(1)+"%",unit:"memorized",active:(s)=>s.memorizedLetters>0,
    sub:(s)=>s.juzEquiv.toFixed(1)+" / 30 juz · "+s.juzDone+" complete"},
  verified:{label:"Verified",blurb:"Confirmed with a local teacher — the most trustworthy measure.",
    cmp:(a,b)=>b.verifiedLetters-a.verifiedLetters,
    value:(s)=>s.verifiedPct.toFixed(1)+"%",unit:"verified ✓",active:(s)=>s.verifiedLetters>0,
    sub:(s)=>"of "+s.pct.toFixed(1)+"% memorized"},
  consistency:{label:"Consistency",blurb:"Longest active daily streak — showing up matters most.",
    cmp:(a,b)=>b.streak-a.streak||b.activeDays-a.activeDays||b.memorizedLetters-a.memorizedLetters,
    value:(s)=>String(s.streak),unit:s=>"day"+(s.streak===1?"":"s")+" 🔥",active:(s)=>s.streak>0,
    sub:(s)=>s.activeDays+" active day"+(s.activeDays===1?"":"s")+(s.lastActive?" · last "+prettyDate(s.lastActive):"")},
  revision:{label:"Revision",blurb:"Most murāja'ah — keeping what's memorized alive.",
    cmp:(a,b)=>b.revisedLetters-a.revisedLetters||b.revSessions-a.revSessions,
    value:(s)=>(s.revisedLetters/JUZ_UNIT).toFixed(1),unit:"juz revised",active:(s)=>s.revisedLetters>0,
    sub:(s)=>s.revSessions+" session"+(s.revSessions===1?"":"s")+(s.lastRevised?" · last "+prettyDate(s.lastRevised):"")},
  momentum:{label:"This month",blurb:"New memorization in the last 30 days — anyone can lead here.",
    cmp:(a,b)=>b.new30-a.new30||b.new7-a.new7,
    value:(s)=>(s.new30/JUZ_UNIT).toFixed(1),unit:"juz this month",active:(s)=>s.new30>0,
    sub:(s)=>(s.new7/JUZ_UNIT).toFixed(1)+" juz this week"},
};

/* ══════════════════════════ ROOT: gate → auth → app ══════════════════════════ */
function Root(){
  const [gated,setGated]=useState(!APP_PASSPHRASE || 
localStorage.getItem("halaqa_gate")==="ok");
  const [user,setUser]=useState(MODE==="firebase"?undefined:null);
  const [localMe,setLocalMe]=useState(()=>{const m=lsGet(LKEY.me);return m&&m.id?m:null;});

  useEffect(()=>{ if(MODE==="firebase") return auth.onAuthStateChanged(u=>setUser(u||null)); },[]);

  if(!gated) return <Gate onPass={()=>{localStorage.setItem("halaqa_gate","ok");setGated(true);}}/>;

  if(MODE==="firebase"){
    if(user===undefined) return <Loading/>;
    if(!user) return <AuthScreen/>;
    return <App currentUid={user.uid} currentEmail={user.email}/>;
  }
  // local test mode
  if(!localMe) return <LocalNameScreen onSet={(name)=>{const me={id:uid(),name:name.trim()};lsSet(LKEY.me,me);
    const ms=lsGet(LKEY.members).filter(x=>x.id!==me.id);ms.push({id:me.id,name:me.name,createdAt:Date.now()});lsSet(LKEY.members,ms);setLocalMe(me);}}/>;
  return <App currentUid={localMe.id} currentEmail={null}/>;
}

function Loading(){return(<div className="center"><div style={{textAlign:"center",color:"var(--soft)"}}>
  <div className="spin" style={{display:"inline-block"}}><Star size={30}/></div>
  <div className="serif" style={{marginTop:8}}>Opening the halaqa…</div></div></div>);}

function Gate(props){
  const [v,setV]=useState("");const [err,setErr]=useState(false);
  function go(){if(v===APP_PASSPHRASE){props.onPass();}else{setErr(true);}}
  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Star size={30} fill="var(--em)"/>
      <h1 className="brand" style={{fontSize:24}}>Halaqa</h1></div>
    <label className="lb">Circle passphrase</label>
    <input className="f" type="password" value={v} autoFocus
      onChange={e=>{setV(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()}/>
    {err && <div style={{color:"var(--danger)",fontSize:12,marginTop:8}}>That passphrase isn't right.</div>}
    <button className="btn primary" style={{marginTop:14,width:"100%"}} onClick={go}>Enter</button>
    <div className="muted" style={{fontSize:11,marginTop:12,lineHeight:1.5}}>Shared with your circle privately. This keeps out strangers; your account still protects your own data.</div>
  </div></div>);
}

function LocalNameScreen(props){
  const [name,setName]=useState("");
  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><Star size={30} fill="var(--em)"/>

function AuthScreen(){
  const [mode,setMode]=useState("in");
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [name,setName]=useState("");
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  async function submit(){
    setErr("");setBusy(true);
    try{
      if(mode==="up"){
        if(!name.trim())throw new Error("Please enter your name.");
        const cred=await auth.createUserWithEmailAndPassword(email.trim(),pw);
        await db.collection("members").doc(cred.user.uid).set({id:cred.user.uid,name:name.trim(),email:email.trim(),createdAt:Date.now()});
      }else{
        await auth.signInWithEmailAndPassword(email.trim(),pw);
      }
    }catch(e){setErr(e.message||String(e));}
    setBusy(false);
  }
  return(<div className="center"><div className="card authcard">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Star size={30} fill="var(--em)"/>
      <h1 className="brand" style={{fontSize:24}}>Halaqa</h1></div>
    <div className="row" style={{marginBottom:16,gap:6}}>
      <button className={"pill"+(mode==="in"?" active":"")} onClick={()=>setMode("in")}>Sign in</button>
      <button className={"pill"+(mode==="up"?" active":"")} onClick={()=>setMode("up")}>Create account</button>
    </div>
    {mode==="up" && <><label className="lb">Your name (shown on the board)</label>
      <input className="f" style={{marginBottom:12}} value={name} onChange={e=>setName(e.target.value)}/></>}
    <label className="lb">Email</label>
    <input className="f" style={{marginBottom:12}} type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
    <label className="lb">Password</label>
    <input className="f" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
    {err && <div style={{color:"var(--danger)",fontSize:12,marginTop:10}}>{err}</div>}
    <button className="btn primary" style={{marginTop:16,width:"100%"}} disabled={busy} onClick={submit}>
      {busy?"…":(mode==="up"?"Create account":"Sign in")}</button>
    <div className="muted" style={{fontSize:11,marginTop:12,lineHeight:1.5}}>Your account protects your data: only you can add or change your own entries.</div>
  </div></div>);
}

/* ══════════════════════════════════ APP ═════════════════════════════════════ */
function App(props){
  const currentUid=props.currentUid;
  const [members,setMembers]=useState([]);
  const [logs,setLogs]=useState([]);
  const [verifs,setVerifs]=useState([]);
  const [membersLoaded,setMembersLoaded]=useState(false);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("standings");
  const [focusMember,setFocusMember]=useState(null);
  const fileRef=useRef(null);

  useEffect(()=>{
    if(MODE==="firebase"){
      const u1=db.collection("members").onSnapshot(s=>{setMembers(s.docs.map(d=>d.data()));setMembersLoaded(true);});
      const u2=db.collection("logs").onSnapshot(s=>{setLogs(s.docs.map(d=>d.data()));setLoading(false);});
      const u3=db.collection("verifications").onSnapshot(s=>setVerifs(s.docs.map(d=>d.data())));
      return()=>{u1();u2();u3();};
    }else{setMembers(lsGet(LKEY.members));setLogs(lsGet(LKEY.logs));setVerifs(lsGet(LKEY.verifs));setMembersLoaded(true);setLoading(false);}
  },[]);

  const stats=useMemo(()=>{
    const arr=members.map(m=>computeMember(m,logs,verifs));
    arr.sort((a,b)=>b.memorizedLetters-a.memorizedLetters||b.verifiedLetters-a.verifiedLetters||b.streak-a.streak);
    return arr;
  },[members,logs,verifs]);
  const groupPct=stats.length?(stats.reduce((t,s)=>t+s.memorizedLetters,0)/(TOTAL_LETTERS*stats.length))*100:0;
  const champions=useMemo(()=>{const out={};for(const k in BOARDS){const B=BOARDS[k];
    const active=stats.filter(B.active).sort(B.cmp);if(active.length)out[k]=active[0].id;}return out;},[stats]);
  const me=stats.find(s=>s.id===currentUid);

  async function addLog(entry){const lg={id:uid(),memberId:currentUid,...entry};
    if(MODE==="firebase")await db.collection("logs").doc(lg.id).set(lg);
    else{const n=[...logs,lg];setLogs(n);lsSet(LKEY.logs,n);}}
  async function removeLog(id){
    if(MODE==="firebase")await db.collection("logs").doc(id).delete();
    else{const n=logs.filter(l=>l.id!==id);setLogs(n);lsSet(LKEY.logs,n);}}
  async function addVerif(entry){const v={id:uid(),memberId:currentUid,...entry};
    if(MODE==="firebase")await db.collection("verifications").doc(v.id).set(v);
    else{const n=[...verifs,v];setVerifs(n);lsSet(LKEY.verifs,n);}}
  async function removeVerif(id){
    if(MODE==="firebase")await db.collection("verifications").doc(id).delete();
    else{const n=verifs.filter(v=>v.id!==id);setVerifs(n);lsSet(LKEY.verifs,n);}}
  async function saveName(name){
    if(MODE==="firebase")await db.collection("members").doc(currentUid).set({id:currentUid,name:name.trim(),email:props.currentEmail||null,createdAt:Date.now()},{merge:true});
    else{const ms=lsGet(LKEY.members).map(m=>m.id===currentUid?{...m,name:name.trim()}:m);setMembers(ms);lsSet(LKEY.members,ms);
      lsSet(LKEY.me,{id:currentUid,name:name.trim()});}}
  function signOut(){ if(MODE==="firebase")auth.signOut(); else {localStorage.removeItem(LKEY.me);location.reload();} }

  function exportData(){
    const payload={app:"halaqa",version:3,exportedAt:new Date().toISOString(),members,logs,verifications:verifs};
    const b=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download="halaqa-backup-"+todayStr()+".json";a.click();URL.revokeObjectURL(u);
  }
  async function importData(file){
    try{
      const data=JSON.parse(await file.text());
      const L=data.logs||[],V=data.verifications||[];
      const myL=L.filter(x=>x.memberId===currentUid),myV=V.filter(x=>x.memberId===currentUid);
      if(!confirm("Import your own backup: "+myL.length+" entries and "+myV.length+" verifications? (Only your data is imported.)"))return;
      if(MODE==="firebase"){
        for(const l of myL)await db.collection("logs").doc(l.id).set(l);
        for(const v of myV)await db.collection("verifications").doc(v.id).set(v);
      }else{
        const ll=Object.values(Object.fromEntries([...logs,...myL].map(l=>[l.id,l])));
        const vv=Object.values(Object.fromEntries([...verifs,...myV].map(v=>[v.id,v])));
        setLogs(ll);lsSet(LKEY.logs,ll);setVerifs(vv);lsSet(LKEY.verifs,vv);
      }
      alert("Import complete.");
    }catch(e){alert("That file didn't look like a Halaqa backup.");}
  }

  if(loading) return <Loading/>;
  // signed in but no profile doc yet
  if(MODE==="firebase" && membersLoaded && !members.find(m=>m.id===currentUid))
    return <SetNameScreen onSet={saveName}/>;

  const focus=focusMember?stats.find(s=>s.id===focusMember):null;
  const account={onSaveName:saveName,onSignOut:signOut,onExport:exportData,onImport:()=>fileRef.current.click(),email:props.currentEmail};

  return(<div className="wrap">
    <header className="top">
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Star size={34} fill="var(--em)"/>
        <div><h1 className="brand">Halaqa</h1><div className="sub">Hifz progress, weighted by length, shared with the circle</div></div>
      </div>
      <div style={{textAlign:"right"}}><div className="big tnum">{groupPct.toFixed(1)}%</div><div className="sub">circle average</div></div>
    </header>

    {MODE==="local" && <div className="banner warn">Local test mode — data stays in this browser only. Add Firebase for real accounts and sharing.</div>}

    <nav className="tabs">
      {[["standings","Standings"],["log","Log entry"],["activity","Activity"],["me","My profile"]].map(t=>(
        <button key={t[0]} className={"pill"+((tab===t[0]&&!focus)?" active":"")}
          onClick={()=>{setFocusMember(null);setTab(t[0]);}}>{t[1]}</button>))}
    </nav>

    {focus
      ? <MemberDetail s={focus} isSelf={focus.id===currentUid} champions={champions}
          onBack={()=>setFocusMember(null)} onRemoveLog={removeLog} onAddVerif={addVerif} onRemoveVerif={removeVerif}/>
      : <React.Fragment>
        {tab==="standings" && <Standings stats={stats} champions={champions} onOpen={setFocusMember}/>}
        {tab==="log" && <LogForm me={me} onAdd={addLog} goStandings={()=>setTab("standings")}/>}
        {tab==="activity" && <Activity logs={logs} members={members} currentUid={currentUid} onRemove={removeLog}/>}
        {tab==="me" && (me
          ? <MemberDetail s={me} isSelf={true} champions={champions} account={account}
              onRemoveLog={removeLog} onAddVerif={addVerif} onRemoveVerif={removeVerif}/>
          : <Loading/>)}
      </React.Fragment>}

    <input ref={fileRef} type="file" accept="application/json" style={{display:"none"}}
      onChange={e=>{if(e.target.files[0]){importData(e.target.files[0]);e.target.value="";}}}/>

    <div className="footer" style={{color:"var(--soft)",borderTop:"1px solid var(--line)",marginTop:40,paddingTop:16,fontSize:11,lineHeight:1.6}}>
      Progress is weighted by letters (huroof): each ayah counts by its share of the Quran's {TOTAL_LETTERS.toLocaleString()} letters. Verification is self-reported — confirmed in person with your own teacher, then recorded here. {MODE==="firebase"?"You can only edit your own entries.":"Add Firebase for real accounts."}
    </div>
  </div>);
}

  return(<div className="center"><div className="card authcard">

  const stats=props.stats;const [board,setBoard]=useState("completion");

  const sorted=[...stats].sort(B.cmp);
  const unitText=(s)=>typeof B.unit==="function"?B.unit(s):B.unit;
  const champBoardsFor=(id)=>Object.keys(BOARDS).filter(k=>props.champions&&props.champions[k]===id);
  const cTotal=stats.reduce((t,s)=>t+s.memorizedLetters,0)/JUZ_UNIT;
  const cVer=stats.reduce((t,s)=>t+s.verifiedLetters,0)/JUZ_UNIT;
  const cMonth=stats.reduce((t,s)=>t+s.new30,0)/JUZ_UNIT;
  return(<div>
    <div className="card" style={{display:"flex",flexWrap:"wrap",gap:"8px 22px",padding:"14px 18px"}}>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--ink)"}}>{cTotal.toFixed(1)}</b> <span className="muted">juz memorized together</span></span>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--brass)"}}>{cVer.toFixed(1)}</b> <span className="muted">juz verified ✓</span></span>
      <span style={{fontSize:13}}><b className="serif tnum" style={{color:"var(--em)"}}>{cMonth.toFixed(1)}</b> <span className="muted">juz this month</span></span>
    </div>
    <div className="tabs" style={{marginTop:0,marginBottom:14}}>
      {Object.keys(BOARDS).map(k=>(
        <button key={k} className={"pill"+(board===k?" active":"")} style={{fontSize:13,padding:"5px 12px"}}
          onClick={()=>setBoard(k)}>{BOARDS[k].label}</button>))}
    </div>
    <div className="muted" style={{fontSize:12,margin:"0 2px 12px"}}>{B.blurb}</div>

    {sorted.map((s,i)=>{const ranked=B.active(s);const rank=ranked?i+1:null;
      return(<button key={s.id} className="card" style={{width:"100%",textAlign:"left",cursor:"pointer",opacity:ranked?1:.6}} onClick={()=>props.onOpen(s.id)}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{position:"relative",width:36,height:36,flexShrink:0}}>
            <Star size={36} fill={ranked&&i<3?medal[i]:"var(--parch2)"} stroke={ranked&&i<3?"none":"var(--line)"}/>
            <span className="serif" style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,fontWeight:600,color:ranked&&i<3?"#fff":"var(--soft)"}}>{rank||"–"}</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8}}>
              <span className="serif" style={{color:"var(--ink)",fontSize:18,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {s.name}{s.pct>=99.9 && <span style={{color:"var(--brass)",fontSize:12,marginLeft:8}}>ḥāfiẓ ★</span>}</span>
              <span style={{textAlign:"right",flexShrink:0,lineHeight:1.1}}>
                <span className="tnum" style={{color:"var(--em)",fontSize:18,fontWeight:600}}>{B.value(s)}</span>
                <span className="muted" style={{display:"block",fontSize:10}}>{unitText(s)}</span>
              </span>
            </div>
            <div className="muted" style={{fontSize:12,marginTop:2}}>
              {B.sub(s)}{board!=="verified" && s.verifiedLetters>0 && <span style={{color:"var(--brass)"}}> · ✓ {s.verifiedPct.toFixed(0)}% verified</span>}
            </div>
            <ChampBadges boards={champBoardsFor(s.id)}/>
          </div>
        </div>
        <div style={{marginTop:12}}><JuzRibbon fractions={s.juzFrac}/></div>
      </button>);})}
  </div>);
}

function VerificationCard(props){
  const {s,isSelf}=props;
  const [surah,setSurah]=useState(1);const [from,setFrom]=useState(1);const [to,setTo]=useState(AYAHS[0]);
  const [by,setBy]=useState("");const [err,setErr]=useState("");
  const maxA=AYAHS[surah-1];
  function pick(n){n=Number(n);setSurah(n);setFrom(1);setTo(AYAHS[n-1]);}
  function add(){setErr("");const f=Number(from),t=Number(to);
    if(f<1||t<1||f>maxA||t>maxA||f>t)return setErr("Enter a valid ayah range for "+NAMES[surah-1]+".");
    props.onAdd({surah,from:f,to:t,by:by.trim(),date:todayStr()});setBy("");}
  const list=[...(s.verifs||[])].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  return(<div className="card">
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>Verified by teacher <span className="muted" style={{fontSize:12,fontWeight:400}}>· ✓ {s.verifiedPct.toFixed(1)}%</span></h3>
    <div className="muted" style={{fontSize:12,marginBottom:12,lineHeight:1.5}}>
      {isSelf?"After you recite a portion to your local imam/teacher and they confirm it, record it here. It's counted only where it overlaps what you've memorized.":"Portions this person had confirmed by their local teacher."}
    </div>
    {isSelf && <div style={{marginBottom:12}}>
      <div className="row" style={{marginBottom:8}}>
        <button className="btn sm" onClick={()=>pick(Math.max(1,surah-1))} disabled={surah<=1} style={surah<=1?{opacity:.4}:{}}>←</button>
        <select className="f" value={surah} onChange={e=>pick(e.target.value)}>
          {NAMES.map((nm,i)=><option key={i} value={i+1}>{i+1} · {nm} ({AYAHS[i]})</option>)}
        </select>
        <button className="btn sm" onClick={()=>pick(Math.min(114,surah+1))} disabled={surah>=114} style={surah>=114?{opacity:.4}:{}}>→</button>
      </div>
      <div className="grid2" style={{marginBottom:8}}>
        <div><label className="lb">From ayah</label><input className="f" type="number" min="1" max={maxA} value={from} onChange={e=>setFrom(e.target.value)}/></div>
        <div><label className="lb">To ayah</label><input className="f" type="number" min="1" max={maxA} value={to} onChange={e=>setTo(e.target.value)}/></div>
      </div>
      <label className="lb">Verified by (teacher / mosque — optional)</label>
      <input className="f" style={{marginBottom:8}} value={by} placeholder="e.g. Imam ___, ___ Masjid" onChange={e=>setBy(e.target.value)}/>
      {err && <div style={{color:"var(--danger)",fontSize:12,marginBottom:8}}>{err}</div>}
      <div className="row"><button className="btn sm" style={{color:"var(--brass)"}} onClick={()=>{setFrom(1);setTo(maxA);}}>Whole surah</button>
        <button className="btn primary sm" onClick={add}>Add verification ✓</button></div>
    </div>}
    {list.length===0 && <div className="muted" style={{fontSize:13}}>Nothing verified yet.</div>}
    {list.map(v=>(<div key={v.id} className="entryrow">
      <span style={{color:"var(--brass)",fontSize:14,flexShrink:0}}>✓</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14}}>{NAMES[v.surah-1]} {v.from}{v.to!==v.from?"–"+v.to:""}</div>
        <div className="muted" style={{fontSize:12}}>{v.by?v.by+" · ":""}{v.date?prettyDate(v.date):""}</div>
      </div>
      {isSelf && <button className="link" style={{color:"var(--danger)"}} onClick={()=>{if(confirm("Remove this verification?"))props.onRemove(v.id);}}>Remove</button>}
    </div>))}
  </div>);
}

function SelfEntries(props){
  const s=props.s;
  const mine=(s._logs||[]);
  return(<div className="card">
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:"0 0 4px"}}>My entries</h3>
    <div className="muted" style={{fontSize:12,marginBottom:8}}>Manage your own memorization and revision entries in the Activity tab (delete a wrong one there); progress updates automatically.</div>
  </div>);
}

function LogForm(props){
  const me=props.me;
  const [type,setType]=useState("new");const [surah,setSurah]=useState(1);
  const [from,setFrom]=useState(1);const [to,setTo]=useState(AYAHS[0]);
  const [date,setDate]=useState(todayStr());const [err,setErr]=useState("");const [savedInfo,setSavedInfo]=useState(null);
  const maxA=AYAHS[surah-1];
  function goSurah(n){n=Math.min(114,Math.max(1,n));setSurah(n);setFrom(1);setTo(AYAHS[n-1]);setSavedInfo(null);setErr("");}
  function submit(){setErr("");const f=Number(from),t=Number(to);
    if(!f||!t||f<1||t<1||f>maxA||t>maxA)return setErr("Ayah must be between 1 and "+maxA+" for "+NAMES[surah-1]+".");
    if(f>t)return setErr("The starting ayah can't be after the ending ayah.");
    props.onAdd({type,surah,from:f,to:t,date});setSavedInfo({surah});}
  return(<div className="card">
    <h2 className="serif" style={{color:"var(--ink)",fontSize:20,margin:"0 0 4px"}}>Log a portion</h2>
    <div className="muted" style={{fontSize:12,marginBottom:16}}>Logging for <b style={{color:"var(--text)"}}>{me?me.name:"you"}</b> — only you can add to your own record.</div>

    <div className="row" style={{marginBottom:16}}>
      {[["new","New memorization","var(--em)"],["rev","Revision","var(--brass)"]].map(o=>(
        <button key={o[0]} className="btn" style={type===o[0]?{background:o[2],color:"var(--parch)",borderColor:o[2]}:{}} onClick={()=>setType(o[0])}>{o[1]}</button>))}
    </div>

    <label className="lb">Surah</label>
    <div className="row" style={{marginBottom:8}}>
      <button className="btn sm" onClick={()=>goSurah(surah-1)} disabled={surah<=1} style={surah<=1?{opacity:.4}:{}}>← Prev</button>
      <select className="f" value={surah} onChange={e=>goSurah(Number(e.target.value))}>
        {NAMES.map((nm,i)=><option key={i} value={i+1}>{i+1} · {nm} ({AYAHS[i]} ayahs)</option>)}
      </select>
      <button className="btn sm" onClick={()=>goSurah(surah+1)} disabled={surah>=114} style={surah>=114?{opacity:.4}:{}}>Next →</button>
    </div>
    <div className="grid2" style={{marginBottom:12}}>
      <div><label className="lb">From ayah</label><input className="f" type="number" min="1" max={maxA} value={from} onChange={e=>setFrom(e.target.value)}/></div>
      <div><label className="lb">To ayah</label><input className="f" type="number" min="1" max={maxA} value={to} onChange={e=>setTo(e.target.value)}/></div>
    </div>
    <button className="btn sm" style={{color:"var(--em)",marginBottom:16}} onClick={()=>{setFrom(1);setTo(maxA);}}>Whole surah</button>
    <label className="lb">Date</label>
    <input className="f" style={{marginBottom:16}} type="date" max={todayStr()} value={date} onChange={e=>setDate(e.target.value)}/>
    {err && <div style={{color:"var(--danger)",fontSize:12,marginBottom:12}}>{err}</div>}
    {!savedInfo
      ? <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button className="btn primary" onClick={submit}>Save entry</button>
          <button className="link" style={{marginLeft:"auto"}} onClick={props.goStandings}>See standings</button></div>
      : <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{color:"var(--em)",fontSize:14}}>Saved ✓</span>
          {savedInfo.surah<114 && <button className="btn primary sm" onClick={()=>goSurah(savedInfo.surah+1)}>Log next: {savedInfo.surah+1} · {NAMES[savedInfo.surah]} →</button>}
          <button className="btn sm" onClick={()=>setSavedInfo(null)}>Log more here</button>
          <button className="link" style={{marginLeft:"auto"}} onClick={props.goStandings}>See standings</button></div>}
  </div>);
}

function Activity(props){
  const nameOf=id=>(props.members.find(m=>m.id===id)||{}).name||"Unknown";
  const sorted=[...props.logs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(!sorted.length)return <Empty title="No entries yet" body="Logged portions from everyone show up here."/>;
  return(<div>{sorted.map(l=>{const own=l.memberId===props.currentUid;
    return(<div key={l.id} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px"}}>
      <Star size={18} fill={l.type==="rev"?"var(--brass2)":"var(--em2)"}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14}}>
          <span className="serif" style={{color:"var(--ink)"}}>{nameOf(l.memberId)}</span>
          <span style={{color:l.type==="rev"?"var(--brass)":"var(--em)"}}> {l.type==="rev"?"revised":"memorized"} </span>
          {NAMES[l.surah-1]} {l.from}{l.to!==l.from?"–"+l.to:""}
        </div>
        <div className="muted" style={{fontSize:12}}>{prettyDate(l.date)}</div>
      </div>
      {own && <button className="link" onClick={()=>{if(confirm("Delete this entry?"))props.onRemove(l.id);}} aria-label="Delete">✕</button>}
    </div>);})}</div>);
}

function Empty(props){
  return(<div className="card dash" style={{textAlign:"center",padding:32}}>
    <div style={{opacity:.4,display:"flex",justifyContent:"center",marginBottom:12}}><Star size={28}/></div>
    <h3 className="serif" style={{color:"var(--ink)",fontSize:18,margin:0}}>{props.title}</h3>
    <div className="muted" style={{fontSize:14,marginTop:4,maxWidth:360,marginLeft:"auto",marginRight:"auto"}}>{props.body}</div>
  </div>);
}

try{ ReactDOM.createRoot(document.getElementById("root")).render(<Root/>); }
catch(e){ var el=document.getElementById("err"); if(el) el.textContent="Startup error: "+(e&&e.message?e.message:e); }
</script>
</body>
</html>
